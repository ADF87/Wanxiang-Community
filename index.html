<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>万象社 · 星月魔法馆 | 后台星盘</title>
    <style>
        :root {
            --bg-deep: #0a0a1a;
            --bg-card: rgba(18, 18, 38, 0.75);
            --bg-card-hover: rgba(28, 28, 55, 0.9);
            --gold: #d9b48b;
            --gold-light: #f3e0c0;
            --moon-glow: #ffe9c7;
            --magic-purple: #b7a9ff;
            --text: #eae5df;
            --text-light: #c9c0b5;
            --border: rgba(230, 210, 180, 0.25);
            --shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            --shadow-gold: 0 0 40px rgba(217, 180, 139, 0.35);
            --radius: 20px;
            --radius-sm: 12px;
            --transition: 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            --font-display: 'Cinzel', 'Georgia', 'Noto Serif SC', serif;
            --font-body: 'Quicksand', 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--font-body);
            background: radial-gradient(circle at 20% 30%, #0c0c1c, #05050f);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
            line-height: 1.5;
        }

        /* 星空背景 canvas */
        #starsCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .nebula-glow {
            position: fixed; border-radius: 50%; filter: blur(130px); opacity: 0.2;
            pointer-events: none; z-index: 0; animation: nebulaSlow 28s infinite alternate;
        }
        .nebula-glow.n1 { width: 700px; height: 700px; background: #5f3b8c; top: -250px; left: -150px; opacity: 0.2; }
        .nebula-glow.n2 { width: 600px; height: 600px; background: #b87c4f; bottom: -180px; right: -100px; }
        .nebula-glow.n3 { width: 500px; height: 500px; background: #3f6a9c; top: 40%; left: 70%; }
        @keyframes nebulaSlow {
            0% { transform: translate(0, 0) scale(1); opacity: 0.15; }
            100% { transform: translate(30px, -40px) scale(1.2); opacity: 0.28; }
        }

        .app-container { position: relative; z-index: 2; max-width: 1300px; margin: 0 auto; padding: 0 24px; }

        /* 导航栏 */
        .navbar {
            position: sticky; top: 20px; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 28px; margin-top: 20px;
            background: rgba(12, 12, 28, 0.55);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 235, 200, 0.25);
            border-radius: 60px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3), 0 0 15px rgba(212,175,120,0.1);
            transition: all var(--transition);
        }
        .navbar:hover { border-color: rgba(217, 180, 139, 0.5); box-shadow: 0 8px 35px rgba(0,0,0,0.4), 0 0 25px rgba(217,180,139,0.2); }
        .logo { display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.2s ease; }
        .logo-icon { filter: drop-shadow(0 0 6px #ffdd99); animation: softGlow 3s infinite alternate; }
        @keyframes softGlow { 0% { filter: drop-shadow(0 0 2px #e8c9a0); } 100% { filter: drop-shadow(0 0 12px #ffd58c); } }
        .logo-text {
            font-family: var(--font-display); font-size: 1.7rem; font-weight: 600;
            background: linear-gradient(135deg, #f9e5b3, #e2bc89, #cb9f6e);
            -webkit-background-clip: text; background-clip: text; color: transparent;
            letter-spacing: 4px;
        }
        .nav-links { display: flex; list-style: none; gap: 12px; flex-wrap: wrap; }
        .nav-links li a {
            color: #f5ede3; text-decoration: none; padding: 8px 20px; border-radius: 40px;
            font-size: 0.95rem; font-weight: 500; letter-spacing: 1.5px;
            transition: all 0.25s; cursor: pointer; white-space: nowrap;
        }
        .nav-links li a:hover, .nav-links li a.active {
            background: rgba(217, 180, 139, 0.2);
            box-shadow: 0 0 16px rgba(217, 180, 139, 0.4);
            color: #fff6ea;
            border-bottom: 1px solid var(--gold);
        }
        .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
        .hamburger span { width: 26px; height: 2px; background: var(--gold-light); border-radius: 4px; }

        .page-section { display: none; animation: fadeUp 0.7s ease-out; padding: 25px 0 70px; }
        .page-section.active { display: block; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }

        .section-header { text-align: center; margin-bottom: 50px; }
        .section-header h1 {
            font-family: var(--font-display); font-size: 3rem; letter-spacing: 6px;
            background: linear-gradient(135deg, #fff3e0, #e7cba5, #d9b48b);
            -webkit-background-clip: text; background-clip: text; color: transparent;
            text-shadow: 0 2px 15px rgba(0,0,0,0.2);
        }
        .subtitle { color: #ccbaa2; letter-spacing: 4px; font-size: 0.9rem; font-weight: 300; }
        .divider { width: 80px; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 16px auto; }

        /* ========= 全新后台UI · 魔法星盘风格 ========= */
        .admin-login-card {
            background: rgba(18, 18, 38, 0.8);
            backdrop-filter: blur(15px);
            border-radius: 48px;
            border: 1px solid rgba(217, 180, 139, 0.5);
            padding: 40px 32px;
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            box-shadow: 0 20px 45px rgba(0,0,0,0.5), 0 0 30px rgba(212,175,120,0.2);
            text-align: center;
        }
        .admin-login-card h3 {
            font-family: var(--font-display);
            font-size: 1.8rem;
            color: #f7e9d7;
            letter-spacing: 4px;
            margin-bottom: 8px;
        }
        .admin-login-card .magic-sub {
            color: #cbbfaa;
            font-size: 0.85rem;
            margin-bottom: 28px;
            border-bottom: 1px dashed rgba(212,175,120,0.4);
            display: inline-block;
            padding-bottom: 6px;
        }
        .admin-login-card input {
            width: 100%;
            padding: 14px 20px;
            background: rgba(20, 18, 35, 0.8);
            border: 1px solid rgba(217, 180, 139, 0.6);
            border-radius: 60px;
            color: #fff3e6;
            font-size: 1rem;
            letter-spacing: 1px;
            outline: none;
            transition: all 0.3s;
        }
        .admin-login-card input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(217,180,139,0.4);
            background: rgba(30, 26, 48, 0.9);
        }
        .btn-star {
            background: linear-gradient(95deg, #b5875a20, #d9b48b30);
            border: 1px solid #d9b48b;
            padding: 12px 28px;
            border-radius: 60px;
            color: #ffefdb;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.25s;
            font-family: var(--font-body);
            backdrop-filter: blur(4px);
        }
        .btn-star:hover {
            background: rgba(217, 180, 139, 0.35);
            box-shadow: 0 0 18px #d9b48b;
            transform: translateY(-2px);
        }
        .admin-panel {
            background: rgba(12, 10, 26, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 42px;
            border: 1px solid rgba(217, 180, 139, 0.45);
            padding: 28px 24px;
            margin-top: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .admin-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-bottom: 32px;
            border-bottom: 1px solid rgba(217,180,139,0.3);
            padding-bottom: 20px;
            align-items: center;
        }
        .admin-tab-btn {
            background: rgba(25, 22, 45, 0.7);
            border: none;
            padding: 10px 26px;
            border-radius: 40px;
            color: #ddd0bd;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1.5px;
            backdrop-filter: blur(4px);
        }
        .admin-tab-btn.active {
            background: rgba(217, 180, 139, 0.25);
            color: #fff3e2;
            box-shadow: 0 0 12px rgba(217,180,139,0.5);
            border: 0.5px solid rgba(217,180,139,0.6);
        }
        .admin-actions {
            margin-left: auto;
            display: flex;
            gap: 10px;
        }
        .admin-table-wrapper {
            overflow-x: auto;
            border-radius: 28px;
            margin-top: 20px;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            border-radius: 24px;
            background: rgba(0,0,0,0.25);
        }
        .admin-table th {
            text-align: left;
            padding: 14px 12px;
            color: #ecd9bc;
            font-weight: 600;
            letter-spacing: 1px;
            border-bottom: 1px solid #bda27a50;
        }
        .admin-table td {
            padding: 12px 12px;
            border-bottom: 1px solid rgba(255,255,240,0.08);
            color: #e0d3c4;
        }
        .admin-table tr:hover td {
            background: rgba(217, 180, 139, 0.1);
        }
        .btn-icon {
            background: none;
            border: 1px solid rgba(217, 180, 139, 0.5);
            border-radius: 32px;
            padding: 6px 14px;
            font-size: 0.75rem;
            margin-right: 6px;
            cursor: pointer;
            transition: all 0.2s;
            color: #f3e0c0;
        }
        .btn-icon:hover {
            background: rgba(212,175,120,0.2);
            border-color: #d9b48b;
        }
        .btn-danger-sm {
            border-color: #c37f6e;
            color: #ffcfbf;
        }
        .btn-danger-sm:hover {
            background: rgba(200, 80, 60, 0.25);
        }
        .add-card-btn {
            margin-top: 28px;
            background: rgba(217, 180, 139, 0.15);
            border: 1px dashed #d9b48b;
            border-radius: 80px;
            padding: 12px 28px;
            font-size: 0.9rem;
            transition: 0.2s;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .edit-form-container {
            background: rgba(0, 0, 0, 0.45);
            border-radius: 32px;
            padding: 24px;
            margin-top: 28px;
            border: 1px solid #cca96e50;
            backdrop-filter: blur(4px);
        }
        .edit-form-container label {
            display: block;
            margin: 14px 0 4px;
            font-size: 0.8rem;
            letter-spacing: 1px;
            color: #e6cfae;
        }
        .edit-form-container input, .edit-form-container textarea {
            width: 100%;
            background: #141128cc;
            border: 1px solid #7f6b4e80;
            border-radius: 20px;
            padding: 10px 16px;
            color: #fdf0e0;
            font-family: var(--font-body);
        }
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: #211e3ae6; backdrop-filter: blur(20px);
            color: #fff0dd; padding: 12px 30px; border-radius: 60px; z-index: 300;
            font-size: 0.9rem; border: 1px solid #d9b48b; transition: transform 0.4s;
            pointer-events: none; white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        @media (max-width: 768px) {
            .nav-links { display: none; flex-direction: column; position: absolute; top: 70px; left: 20px; right: 20px; background: rgba(0,0,0,0.75); backdrop-filter: blur(15px); border-radius: 30px; padding: 20px; z-index: 99; }
            .nav-links.open { display: flex; }
            .hamburger { display: flex; }
            .admin-toolbar { flex-direction: column; align-items: stretch; }
            .admin-actions { margin-left: 0; justify-content: flex-start; }
            .toast { white-space: normal; text-align: center; }
        }
        /* 作品/成员原始卡片样式保留 */
        .works-grid, .members-grid, .news-grid { display: grid; gap: 28px; margin-top: 20px; }
        .works-grid { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
        .work-card, .member-name-card, .news-card { background: var(--bg-card); backdrop-filter: blur(4px); border-radius: 28px; border: 1px solid var(--border); transition: all 0.3s; cursor: pointer; overflow: hidden; }
        .work-card:hover, .member-name-card:hover, .news-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-gold); border-color: var(--gold); }
        .card-img { width: 100%; height: 220px; object-fit: cover; }
        .card-body, .news-body { padding: 18px; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 20, 0.85); backdrop-filter: blur(12px); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .modal-overlay.show { opacity: 1; pointer-events: all; }
        .modal-panel { background: #1c1835e6; border-radius: 36px; border: 1px solid #d9b48b; max-width: 550px; width: 90%; padding: 28px; text-align: center; backdrop-filter: blur(12px); }
        .work-modal-panel { max-width: 700px; width: 92%; max-height: 85vh; overflow-y: auto; background: #201e3ce6; border-radius: 42px; padding: 24px; position: relative; }
    </style>
</head>
<body>
<div class="nebula-glow n1"></div><div class="nebula-glow n2"></div><div class="nebula-glow n3"></div>
<canvas id="starsCanvas"></canvas>
<div class="toast" id="toast"></div>

<div class="app-container">
    <nav class="navbar">
        <div class="logo" onclick="navigateTo('home')">
            <span class="logo-icon"><svg width="44" height="44" viewBox="0 0 44 44"><path d="M22 4 L26 12 L36 14 L28 22 L30 32 L22 27 L14 32 L16 22 L8 14 L18 12 L22 4Z" fill="#e9c996" stroke="#d4a574"/><circle cx="22" cy="18" r="4" fill="#fff3df"/></svg></span>
            <span class="logo-text">万象社</span>
        </div>
        <div class="hamburger" id="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></div>
        <ul class="nav-links" id="navLinks">
            <li><a onclick="navigateTo('home')" data-page="home" class="active">🌙 首页</a></li>
            <li><a onclick="navigateTo('works')" data-page="works">✨ 作品集</a></li>
            <li><a onclick="navigateTo('members')" data-page="members">🪄 成员</a></li>
            <li><a onclick="navigateTo('news')" data-page="news">📜 资讯</a></li>
            <li><a onclick="navigateTo('admin')" data-page="admin">⚙️ 星盘管理</a></li>
        </ul>
    </nav>

    <section class="page-section active" id="page-home"> <!-- 略简首页内容 --> 
        <div class="section-header"><h1>万 象 · 星 月</h1><p class="subtitle">万般景象，皆汇于魔法星尘之下</p><div class="divider"></div></div>
        <div style="text-align:center;max-width:750px;margin:0 auto;color:#ddd2c2;"><p style="font-size:1.25rem;">欢迎来到 <span style="color:var(--gold-light);">万象社 · 星月魔法馆</span></p><p>✨ 仰望星河，笔绘万象 ✨</p></div>
    </section>
    <section class="page-section" id="page-works"><div class="section-header"><h1>📖 灵 感 集</h1><div class="divider"></div></div><div class="works-grid" id="worksGrid"></div></section>
    <section class="page-section" id="page-members"><div class="section-header"><h1>🌟 星 辰 名 录</h1><div class="divider"></div></div><div class="members-grid" id="membersGrid"></div></section>
    <section class="page-section" id="page-news"><div class="section-header"><h1>📯 时 讯 之 书</h1><div class="divider"></div></div><div class="news-grid" id="newsList"></div></section>

    <!-- 全新管理后台模块 UI 重构 -->
    <section class="page-section" id="page-admin">
        <div class="section-header"><h1>🔮 星 盘 管 理</h1><p class="subtitle">万象枢要 · 秘仪编辑</p><div class="divider"></div></div>
        <div id="adminLoginArea" style="max-width:450px;margin:60px auto;">
            <div class="admin-login-card">
                <h3>✨ 星钥 ✨</h3>
                <div class="magic-sub">管理员秘仪之门</div>
                <input type="password" id="adminPassword" placeholder="请输入管理密码">
                <button class="btn-star" style="margin-top:28px;" onclick="adminLogin()">启 动 星 盘</button>
            </div>
        </div>
        <div id="adminPanelArea" style="display:none;">
            <div class="admin-panel">
                <div class="admin-toolbar">
                    <button class="admin-tab-btn" data-tab="works" onclick="switchAdminTab('works')">📦 作品管理</button>
                    <button class="admin-tab-btn" data-tab="members" onclick="switchAdminTab('members')">👥 成员管理</button>
                    <button class="admin-tab-btn" data-tab="news" onclick="switchAdminTab('news')">📰 资讯管理</button>
                    <div class="admin-actions">
                        <button class="btn-icon" onclick="exportDataJSON()">💾 导出星图</button>
                        <button class="btn-icon btn-danger-sm" onclick="adminLogout()">退出星盘</button>
                    </div>
                </div>
                <div id="adminContentArea"></div>
            </div>
        </div>
    </section>
    <div class="site-footer" style="text-align:center;padding:30px;opacity:0.6;"><p>© 万象社 · 星月魔法纪元</p></div>
</div>

<!-- 模态框 -->
<div class="modal-overlay" id="workModal"><div class="work-modal-panel" style="position:relative;"><button class="modal-close-btn" style="position:absolute;right:20px;top:15px;background:none;border:none;font-size:24px;color:#fff;" onclick="closeWorkModal()">✕</button><img id="workModalImage" style="width:100%;border-radius:24px;"><h2 id="workModalTitle" style="margin-top:16px;"></h2><div id="workModalAuthor" style="color:var(--gold-light);"></div><div id="workModalDesc"></div></div></div>
<div class="modal-overlay" id="memberModal"><div class="modal-panel"><h2 id="modalName"></h2><p id="modalRole"></p><p id="modalId"></p><p id="modalSignature"></p><button onclick="closeMemberModal()" style="margin-top:16px;">关闭</button></div></div>
<div class="modal-overlay" id="articleModal"><div class="modal-panel" style="max-width:700px;"><h2 id="articleTitle"></h2><div id="articleBody"></div><button onclick="closeArticleModal()">关闭</button></div></div>

<script>
    // ========== 星空特效（极简保留） ==========
    (function() {
        const canvas = document.getElementById('starsCanvas');
        const ctx = canvas.getContext('2d');
        let stars = []; let w,h;
        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        for(let i=0;i<280;i++) stars.push({ x:Math.random()*w, y:Math.random()*h, size:Math.random()*2+0.5, alpha:Math.random()*0.6+0.2 });
        function animate() {
            ctx.clearRect(0,0,w,h);
            stars.forEach(s=>{ ctx.beginPath(); ctx.arc(s.x,s.y,s.size,0,Math.PI*2); ctx.fillStyle=`rgba(255,235,190,${s.alpha+Math.sin(Date.now()*0.002)*0.2})`; ctx.fill(); });
            // 极简魔法月亮
            ctx.shadowBlur=20; ctx.fillStyle='#fbefc2'; ctx.beginPath(); ctx.arc(w-80,75,32,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#e4bf89'; ctx.beginPath(); ctx.arc(w-75,70,10,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
            requestAnimationFrame(animate);
        }
        animate();
    })();

    // ========== 数据核心 ==========
    const DATA_KEYS = { works:'wxs_works', members:'wxs_members', news:'wxs_news' };
    const defaultWorks = [ { id:1, title:'星月夜', author:'林月如', desc:'数字绘画，融合东方意境与现代技法，星月交织。', image:'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=700&q=80' }, { id:2, title:'城市脉搏', author:'陈远航', desc:'夜晚霓虹与流动车轨，都市魔法时刻。', image:'https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=700&q=80' } ];
    const defaultMembers = [ { id:1, name:'林月如', role:'社长', number:'WX-001', signature:'以画笔描绘万象。', avatar:'' }, { id:2, name:'陈远航', role:'副社长', number:'WX-002', signature:'镜头之下，皆是故事。', avatar:'' } ];
    const defaultNews = [ { id:1, date:'2024-12-20', title:'年度作品展圆满落幕', summary:'展出30余件社员作品，观众好评如潮。', content:'<p>展览盛况空前，多件作品获赞。</p><img src="https://images.unsplash.com/photo-1460661419201-fd4cecdf8a8b?w=400">', image:'https://images.unsplash.com/photo-1460661419201-fd4cecdf8a8b?w=400' }, { id:2, date:'2024-11-08', title:'新社员招募启动', summary:'面向创意爱好者开放。', content:'<p>欢迎绘画、摄影等伙伴加入。</p>', image:'' } ];
    function getLocalData(key) { try{ return JSON.parse(localStorage.getItem(DATA_KEYS[key])); }catch(e){return null;} }
    function setLocalData(key,data){ localStorage.setItem(DATA_KEYS[key], JSON.stringify(data)); }
    function initLocalData(){ if(!getLocalData('works')) setLocalData('works',defaultWorks); if(!getLocalData('members')) setLocalData('members',defaultMembers); if(!getLocalData('news')) setLocalData('news',defaultNews); }
    async function loadCloudData(){ try{ const res=await fetch('data.json'); if(res.ok){ const cloud=await res.json(); if(cloud.works) setLocalData('works',cloud.works); if(cloud.members) setLocalData('members',cloud.members); if(cloud.news) setLocalData('news',cloud.news); } } catch(e){} }
    function exportDataJSON(){ const data={ works:getLocalData('works'), members:getLocalData('members'), news:getLocalData('news') }; const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='data.json'; a.click(); showToast('✅ 星图已导出'); }
    function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2400); }
    function esc(s){ const div=document.createElement('div'); div.textContent=s||''; return div.innerHTML; }

    // 页面导航渲染
    let currentPage='home';
    function navigateTo(page){
        document.querySelectorAll('.page-section').forEach(s=>s.classList.remove('active'));
        document.getElementById('page-'+page).classList.add('active');
        currentPage=page;
        document.querySelectorAll('.nav-links a').forEach(a=>a.classList.remove('active'));
        const navA=document.querySelector(`.nav-links a[data-page="${page}"]`); if(navA) navA.classList.add('active');
        document.getElementById('navLinks').classList.remove('open');
        if(page==='works') renderWorks(); if(page==='members') renderMembers(); if(page==='news') renderNews(); if(page==='admin') checkAdminStatus();
        window.scrollTo(0,0);
    }
    function toggleMenu(){ document.getElementById('navLinks').classList.toggle('open'); }

    function renderWorks(){ const works=getLocalData('works')||[]; const grid=document.getElementById('worksGrid'); grid.innerHTML=works.map(w=>`<div class="work-card" onclick="openWorkDetail(${w.id})"><img class="card-img" src="${esc(w.image)}" onerror="this.src='https://picsum.photos/400/220'"><div class="card-body"><h3>${esc(w.title)}</h3><p class="author">✨ ${esc(w.author)}</p><p>${esc(w.desc)}</p></div></div>`).join(''); }
    function renderMembers(){ const members=getLocalData('members')||[]; document.getElementById('membersGrid').innerHTML=members.map(m=>`<div class="member-name-card" onclick="openMemberModal(${m.id})"><div class="avatar-dot" style="width:70px;height:70px;background:#8f73b0;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;">${(m.name?.charAt(0)||'?')}</div><div class="member-name">${esc(m.name)}</div><div>${esc(m.role)}</div></div>`).join(''); }
    function renderNews(){ const news=getLocalData('news')||[]; document.getElementById('newsList').innerHTML=news.map(n=>`<div class="news-card" onclick="openArticle(${n.id})"><div class="news-body"><div class="news-date">📅 ${esc(n.date)}</div><h3>${esc(n.title)}</h3><p>${esc(n.summary||'')}</p></div></div>`).join(''); }
    function openWorkDetail(id){ const w=getLocalData('works').find(w=>w.id===id); if(w){ document.getElementById('workModalImage').src=w.image; document.getElementById('workModalTitle').innerText=w.title; document.getElementById('workModalAuthor').innerHTML=`作者 · ${esc(w.author)}`; document.getElementById('workModalDesc').innerHTML=w.desc; document.getElementById('workModal').classList.add('show'); } }
    function closeWorkModal(){ document.getElementById('workModal').classList.remove('show');}
    function openMemberModal(id){ const m=getLocalData('members').find(m=>m.id===id); if(m){ document.getElementById('modalName').innerText=m.name; document.getElementById('modalRole').innerText=m.role; document.getElementById('modalId').innerText=m.number; document.getElementById('modalSignature').innerText=m.signature; document.getElementById('memberModal').classList.add('show');} }
    function closeMemberModal(){ document.getElementById('memberModal').classList.remove('show');}
    function openArticle(id){ const a=getLocalData('news').find(n=>n.id===id); if(a){ document.getElementById('articleTitle').innerText=a.title; document.getElementById('articleBody').innerHTML=a.content||'无正文'; document.getElementById('articleModal').classList.add('show');} }
    function closeArticleModal(){ document.getElementById('articleModal').classList.remove('show');}

    // ========== 后台管理全新交互 ==========
    const ADMIN_PW='wanxiang2024';
    let adminTab='works';
    function checkAdminStatus(){ const logged=sessionStorage.getItem('wxs_admin'); const loginDiv=document.getElementById('adminLoginArea'); const panelDiv=document.getElementById('adminPanelArea'); if(logged==='true'){ loginDiv.style.display='none'; panelDiv.style.display='block'; switchAdminTab(adminTab); } else { loginDiv.style.display='block'; panelDiv.style.display='none'; } }
    function adminLogin(){ if(document.getElementById('adminPassword').value===ADMIN_PW){ sessionStorage.setItem('wxs_admin','true'); checkAdminStatus(); showToast('✅ 星钥验证成功'); } else showToast('❌ 星钥错误'); }
    function adminLogout(){ sessionStorage.removeItem('wxs_admin'); checkAdminStatus(); showToast('已退出星盘'); }
    function switchAdminTab(tab){ adminTab=tab; document.querySelectorAll('.admin-tab-btn').forEach(btn=>btn.classList.remove('active')); document.querySelector(`.admin-tab-btn[data-tab="${tab}"]`)?.classList.add('active'); renderAdminContent(); }
    function renderAdminContent(){
        const data=getLocalData(adminTab)||[];
        const cfg={ works:{ fields:['title','author','desc','image'], labels:['标题','作者','描述','图片URL'] }, members:{ fields:['name','role','number','signature','avatar'], labels:['昵称','职位','编号','签名','头像URL'] }, news:{ fields:['title','date','summary','content','image'], labels:['标题','日期','摘要','正文','封面URL'] } }[adminTab];
        let html=`<div class="admin-table-wrapper"><table class="admin-table"><thead><tr><th>ID</th>${cfg.fieldLabels.map(l=>`<th>${l}</th>`).join('')}<th>操作</th></tr></thead><tbody>`;
        data.forEach(item=>{ html+=`<tr><td>${item.id}</td>`; cfg.fields.forEach(f=>{ let val=item[f]||''; val=val.length>40?val.slice(0,37)+'...':val; html+=`<td title="${esc(item[f]||'')}">${esc(val)}</td>`; }); html+=`<td><button class="btn-icon" onclick="editItem('${adminTab}',${item.id})">✏️</button> <button class="btn-icon btn-danger-sm" onclick="deleteItem('${adminTab}',${item.id})">🗑</button></td></tr>`; });
        html+=`</tbody></table></div><button class="add-card-btn" onclick="addItem('${adminTab}')">✨ + 新增条目</button><div id="editFormArea" style="display:none;" class="edit-form-container"></div>`;
        document.getElementById('adminContentArea').innerHTML=html;
    }
    function getNextId(tab){ const d=getLocalData(tab)||[]; return d.length?Math.max(...d.map(i=>i.id))+1:1; }
    function addItem(tab){ const cfgMap={ works:{fields:['title','author','desc','image'],labels:['标题','作者','描述','图片URL']}, members:{fields:['name','role','number','signature','avatar'],labels:['昵称','职位','编号','签名','头像URL']}, news:{fields:['title','date','summary','content','image'],labels:['标题','日期','摘要','正文','封面URL']} }; const {fields,labels}=cfgMap[tab]; let h=`<h4 style="margin-bottom:12px;">✨ 新增${cfgMap[tab].labels[0]}星辉</h4>`; fields.forEach((f,i)=>{ const isTA=['desc','summary','content','signature'].includes(f); h+=`<label>${labels[i]}</label>`; h+=isTA?`<textarea id="f_${f}" rows="3" style="width:100%;"></textarea>`:`<input id="f_${f}" value="${tab==='news'&&f==='date'?new Date().toISOString().split('T')[0]:''}">`; if(f==='content') h+=`<button type="button" class="btn-icon" style="margin-top:5px;" onclick="insertImageToField('f_content')">📷 插入图片</button>`; }); h+=`<div style="margin-top:20px;display:flex;gap:12px;"><button class="btn-star" onclick="saveNew('${tab}')">保存星轨</button><button class="btn-icon" onclick="document.getElementById('editFormArea').style.display='none'">取消</button></div>`; const fa=document.getElementById('editFormArea'); fa.style.display='block'; fa.innerHTML=h; }
    function editItem(tab,id){ const data=getLocalData(tab); const item=data.find(d=>d.id===id); if(!item)return; const cfgMap={ works:{fields:['title','author','desc','image'],labels:['标题','作者','描述','图片URL']}, members:{fields:['name','role','number','signature','avatar'],labels:['昵称','职位','编号','签名','头像URL']}, news:{fields:['title','date','summary','content','image'],labels:['标题','日期','摘要','正文','封面URL']} }; const {fields,labels}=cfgMap[tab]; let h=`<h4>✏️ 编辑 ID ${id}</h4>`; fields.forEach((f,i)=>{ const val=item[f]||''; const isTA=['desc','summary','content','signature'].includes(f); h+=`<label>${labels[i]}</label>`; h+=isTA?`<textarea id="f_${f}" rows="3">${esc(String(val))}</textarea>`:`<input id="f_${f}" value="${esc(String(val))}">`; if(f==='content') h+=`<button type="button" class="btn-icon" onclick="insertImageToField('f_content')">📷 插入图片</button>`; }); h+=`<div style="margin-top:20px;gap:10px;display:flex;"><button class="btn-star" onclick="saveEdit('${tab}',${id})">更新</button><button class="btn-icon" onclick="document.getElementById('editFormArea').style.display='none'">取消</button></div>`; const fa=document.getElementById('editFormArea'); fa.style.display='block'; fa.innerHTML=h; }
    function insertImageToField(fieldId){ const url=prompt('输入图片链接:'); if(url){ const ta=document.getElementById(fieldId); if(ta){ const start=ta.selectionStart; const end=ta.selectionEnd; const txt=ta.value; ta.value=txt.substring(0,start)+`<img src="${url}" alt="插图">`+txt.substring(end); ta.focus(); } } }
    function saveNew(tab){ const fields={ works:['title','author','desc','image'], members:['name','role','number','signature','avatar'], news:['title','date','summary','content','image'] }[tab]; const obj={id:getNextId(tab)}; fields.forEach(f=>{ const el=document.getElementById('f_'+f); if(el) obj[f]=el.value; }); if(!obj[fields[0]]){ showToast('请填写主要字段'); return; } const data=getLocalData(tab)||[]; data.push(obj); setLocalData(tab,data); document.getElementById('editFormArea').style.display='none'; renderAdminContent(); refreshPage(tab); showToast('已保存至本地星盘'); }
    function saveEdit(tab,id){ const fields={ works:['title','author','desc','image'], members:['name','role','number','signature','avatar'], news:['title','date','summary','content','image'] }[tab]; const data=getLocalData(tab)||[]; const idx=data.findIndex(d=>d.id===id); if(idx<0)return; fields.forEach(f=>{ const el=document.getElementById('f_'+f); if(el) data[idx][f]=el.value; }); setLocalData(tab,data); document.getElementById('editFormArea').style.display='none'; renderAdminContent(); refreshPage(tab); showToast('更新完成'); }
    function deleteItem(tab,id){ if(confirm('永久删除该条目？')){ let data=getLocalData(tab)||[]; data=data.filter(d=>d.id!==id); setLocalData(tab,data); renderAdminContent(); refreshPage(tab); showToast('已抹除'); } }
    function refreshPage(tab){ if(tab==='works') renderWorks(); if(tab==='members') renderMembers(); if(tab==='news') renderNews(); }

    window.onload=async()=>{ initLocalData(); await loadCloudData(); renderWorks(); renderMembers(); renderNews(); navigateTo('home'); checkAdminStatus(); document.querySelectorAll('.modal-overlay').forEach(modal=>{ modal.addEventListener('click',e=>{ if(e.target===modal){ modal.classList.remove('show'); document.body.style.overflow=''; } }); }); };
</script>
</body>
</html>
