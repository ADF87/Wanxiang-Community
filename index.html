<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>万象社 · 星月魔法馆 | 万般景象，皆汇于此</title>
    <style>
        :root {
            --bg-deep: #0a0a1a;
            --bg-card: rgba(18, 18, 38, 0.75);
            --bg-card-hover: rgba(28, 28, 55, 0.9);
            --gold: #d9b48b;
            --gold-light: #f3e0c0;
            --moon-glow: #ffe9c7;
            --magic-purple: #b7a9ff;
            --text: #eae5df;
            --text-light: #c9c0b5;
            --border: rgba(230, 210, 180, 0.2);
            --shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            --shadow-gold: 0 0 40px rgba(217, 180, 139, 0.35);
            --radius: 20px;
            --radius-sm: 12px;
            --transition: 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            --font-display: 'Cinzel', 'Georgia', 'Noto Serif SC', serif;
            --font-body: 'Quicksand', 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--font-body);
            background: radial-gradient(circle at 20% 30%, #0c0c1c, #05050f);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
            line-height: 1.5;
            font-weight: 400;
        }

        /* 魔法星尘背景层 (Canvas 绘制具体特效) */
        #starsCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

        /* 静态星云柔光 (增加魔法氛围) */
        .nebula-glow {
            position: fixed; border-radius: 50%; filter: blur(130px); opacity: 0.2;
            pointer-events: none; z-index: 0; animation: nebulaSlow 28s infinite alternate;
        }
        .nebula-glow.n1 { width: 700px; height: 700px; background: #5f3b8c; top: -250px; left: -150px; opacity: 0.2; }
        .nebula-glow.n2 { width: 600px; height: 600px; background: #b87c4f; bottom: -180px; right: -100px; }
        .nebula-glow.n3 { width: 500px; height: 500px; background: #3f6a9c; top: 40%; left: 70%; }
        @keyframes nebulaSlow {
            0% { transform: translate(0, 0) scale(1); opacity: 0.15; }
            100% { transform: translate(30px, -40px) scale(1.2); opacity: 0.28; }
        }

        .app-container { position: relative; z-index: 2; max-width: 1300px; margin: 0 auto; padding: 0 24px; }

        /* 魔法玻璃导航栏 */
        .navbar {
            position: sticky; top: 20px; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 28px; margin-top: 20px;
            background: rgba(12, 12, 28, 0.55);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 235, 200, 0.25);
            border-radius: 60px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3), 0 0 15px rgba(212,175,120,0.1);
            transition: all var(--transition);
        }
        .navbar:hover { border-color: rgba(217, 180, 139, 0.5); box-shadow: 0 8px 35px rgba(0,0,0,0.4), 0 0 25px rgba(217,180,139,0.2); }
        .logo {
            display: flex; align-items: center; gap: 12px; cursor: pointer;
            transition: all 0.2s ease;
        }
        .logo-icon {
            filter: drop-shadow(0 0 6px #ffdd99);
            animation: softGlow 3s infinite alternate;
        }
        @keyframes softGlow { 0% { filter: drop-shadow(0 0 2px #e8c9a0); } 100% { filter: drop-shadow(0 0 12px #ffd58c); } }
        .logo-text {
            font-family: var(--font-display); font-size: 1.7rem; font-weight: 600;
            background: linear-gradient(135deg, #f9e5b3, #e2bc89, #cb9f6e);
            -webkit-background-clip: text; background-clip: text; color: transparent;
            letter-spacing: 4px;
        }
        .nav-links { display: flex; list-style: none; gap: 12px; flex-wrap: wrap; }
        .nav-links li a {
            color: #f5ede3; text-decoration: none; padding: 8px 20px; border-radius: 40px;
            font-size: 0.95rem; font-weight: 500; letter-spacing: 1.5px; backdrop-filter: blur(4px);
            transition: all 0.25s; cursor: pointer; white-space: nowrap;
        }
        .nav-links li a:hover, .nav-links li a.active {
            background: rgba(217, 180, 139, 0.2);
            box-shadow: 0 0 16px rgba(217, 180, 139, 0.4);
            color: #fff6ea;
            border-bottom: 1px solid var(--gold);
        }
        .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
        .hamburger span { width: 26px; height: 2px; background: var(--gold-light); border-radius: 4px; }

        .page-section { display: none; animation: fadeUp 0.7s ease-out; padding: 25px 0 70px; }
        .page-section.active { display: block; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }

        .section-header { text-align: center; margin-bottom: 50px; }
        .section-header h1 {
            font-family: var(--font-display); font-size: 3rem; letter-spacing: 6px;
            background: linear-gradient(135deg, #fff3e0, #e7cba5, #d9b48b);
            -webkit-background-clip: text; background-clip: text; color: transparent;
            text-shadow: 0 2px 15px rgba(0,0,0,0.2);
        }
        .subtitle { color: #ccbaa2; letter-spacing: 4px; font-size: 0.9rem; font-weight: 300; }
        .divider { width: 80px; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 16px auto; }

        /* 作品网格 */
        .works-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .work-card {
            background: var(--bg-card); backdrop-filter: blur(4px);
            border: 1px solid rgba(220, 190, 140, 0.3); border-radius: 28px;
            overflow: hidden; cursor: pointer; transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: var(--shadow);
        }
        .work-card:hover {
            transform: translateY(-10px) scale(1.01);
            border-color: var(--gold);
            box-shadow: var(--shadow-gold), 0 20px 40px rgba(0,0,0,0.6);
            background: var(--bg-card-hover);
        }
        .work-card .card-img { width: 100%; height: 230px; object-fit: cover; display: block; transition: transform 0.5s ease; }
        .work-card:hover .card-img { transform: scale(1.05); }
        .work-card .card-body { padding: 20px 22px; }
        .work-card h3 { font-family: var(--font-display); font-size: 1.3rem; color: #fff6ea; margin-bottom: 6px; }
        .work-card .author { color: var(--gold-light); font-size: 0.85rem; letter-spacing: 1px; margin-bottom: 8px; }
        .work-card .desc { color: #cfc5b8; font-size: 0.85rem; line-height: 1.45; }

        /* 成员样式保留 --- 增加魔法点缀 */
        .members-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 24px; }
        .member-name-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 30px; padding: 24px 12px; text-align: center; cursor: pointer; transition: all var(--transition); backdrop-filter: blur(5px); }
        .member-name-card:hover { transform: translateY(-8px); box-shadow: var(--shadow-gold); border-color: var(--gold); }
        .avatar-dot { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 14px; background: linear-gradient(145deg, #5f4b7c, #8f73b0); display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold; box-shadow: 0 0 20px rgba(160,130,220,0.4); overflow: hidden; }
        .member-name { font-family: var(--font-display); font-size: 1.1rem; letter-spacing: 2px; }

        /* 资讯网格保留提升 */
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .news-card { background: var(--bg-card); border-radius: 28px; backdrop-filter: blur(4px); border: 1px solid rgba(200,170,130,0.3); transition: all 0.3s; cursor: pointer; overflow: hidden; }
        .news-card:hover { transform: translateY(-6px); border-color: var(--gold); box-shadow: var(--shadow-gold); }
        .news-img { width: 100%; height: 180px; object-fit: cover; }
        .news-body { padding: 20px; }
        .news-date { color: var(--gold-light); font-size: 0.75rem; letter-spacing: 1.5px; }

        /* 作品详情模态框 (魔法风格) */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 20, 0.85); backdrop-filter: blur(12px); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; }
        .modal-overlay.show { opacity: 1; pointer-events: all; }
        .work-modal-panel {
            background: rgba(22, 18, 38, 0.96); border: 1px solid #d9b48b; border-radius: 40px;
            max-width: 700px; width: 92%; max-height: 85vh; overflow-y: auto;
            padding: 28px 30px; text-align: left; box-shadow: 0 20px 50px rgba(0,0,0,0.7), 0 0 35px rgba(217,180,139,0.3);
            transform: translateY(20px) scale(0.96); transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.2);
        }
        .modal-overlay.show .work-modal-panel { transform: translateY(0) scale(1); }
        .work-modal-img { width: 100%; max-height: 420px; object-fit: cover; border-radius: 28px; margin-bottom: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.4); border: 1px solid var(--gold); }
        .work-modal-title { font-family: var(--font-display); font-size: 1.9rem; color: #fff2e2; letter-spacing: 2px; }
        .work-modal-author { color: var(--gold-light); font-size: 1rem; margin: 6px 0 12px; border-left: 3px solid var(--gold); padding-left: 12px; }
        .work-modal-desc { font-size: 1rem; line-height: 1.6; color: #e2d9d0; margin-top: 15px; }
        .modal-close-btn { position: absolute; top: 18px; right: 22px; background: none; border: none; color: #fff; font-size: 28px; cursor: pointer; opacity: 0.7; transition: 0.2s; }
        .modal-close-btn:hover { opacity: 1; transform: rotate(90deg); }

        /* 原有其他模态框保留微调 */
        .modal-panel { background: rgba(28, 24, 48, 0.96); border-radius: 32px; border: 1px solid #d9b48b; }
        .article-modal-panel { max-width: 800px; max-height: 80vh; overflow-y: auto; }
        .btn, .btn-gold { transition: all 0.2s; font-weight: 500; }
        .admin-panel { background: rgba(10, 8, 24, 0.9); backdrop-filter: blur(12px); border-radius: 32px; border: 1px solid #bda27a; }
        .toast { background: #2a2540; border: 1px solid #d9b48b; box-shadow: 0 0 12px #ffd7a0; }
        @media (max-width: 768px) {
            .nav-links { display: none; flex-direction: column; position: absolute; top: 70px; left: 20px; right: 20px; background: rgba(0,0,0,0.75); backdrop-filter: blur(15px); border-radius: 30px; padding: 20px; z-index: 99; }
            .nav-links.open { display: flex; }
            .hamburger { display: flex; }
            .section-header h1 { font-size: 2rem; }
            .work-modal-panel { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="nebula-glow n1"></div><div class="nebula-glow n2"></div><div class="nebula-glow n3"></div>

                    <circle cx="22" cy="18" r="4" fill="#fff3df" stroke="#c9975a" stroke-width="1"/>

<script>
    // ----- 魔法星空 · 月轮 & 星尘微粒 -----
    (function() {
        const canvas = document.getElementById('starsCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [], magicDust = [];
        let mouseX = 0, mouseY = 0, targetX = 0, targetY = 0;
        let moonPhase = 0;
        const STAR_COUNT = 320;
        
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resize(); window.addEventListener('resize', resize);
        document.addEventListener('mousemove', (e) => { targetX = e.clientX; targetY = e.clientY; });
        
        function createStar() {
            return { x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 2.2 + 0.6, 
                     baseAlpha: Math.random() * 0.6 + 0.3, speed: Math.random() * 0.015 + 0.002, 
                     hue: Math.random() < 0.2 ? (Math.random() * 30 + 40) : (Math.random() * 60 + 200) };
        }
        for (let i=0; i<STAR_COUNT; i++) stars.push(createStar());
        
        // 魔法浮尘粒子
        for (let i=0;i<110;i++) {
            magicDust.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, radius: Math.random() * 1.8 + 0.8, alpha: Math.random() * 0.5 + 0.2, speedX: (Math.random() - 0.5)*0.3, speedY: (Math.random() - 0.5)*0.2 });
        }
        
        let shootingStars = [];
        function spawnShootingStar() { return { x: Math.random() * canvas.width * 0.7, y: Math.random() * canvas.height * 0.4, len: 100 + Math.random() * 80, speed: 8+Math.random()*7, angle: Math.PI/4 + (Math.random()-0.5)*0.4, life: 45+Math.random()*40, maxLife:0, alpha:1 }; }
        
        function drawMoon(ctx, w, h) {
            const moonX = w - 100, moonY = 85;
            const time = Date.now() * 0.0008;
            const glowRad = 62;
            ctx.shadowBlur = 0;
            const grad = ctx.createRadialGradient(moonX-5, moonY-5, 5, moonX, moonY, 48);
            grad.addColorStop(0, '#fff9ea');
            grad.addColorStop(0.6, '#f7de9c');
            grad.addColorStop(1, '#d9b48b');
            ctx.beginPath();
            ctx.arc(moonX, moonY, 34, 0, Math.PI*2);
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.shadowColor = '#ffedb3';
            ctx.shadowBlur = 40;
            ctx.beginPath(); ctx.arc(moonX, moonY, 34, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
            // 月面纹理
            ctx.fillStyle = '#c9986eb3';
            ctx.beginPath(); ctx.arc(moonX-7, moonY-4, 6, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(moonX+8, moonY+5, 5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#ebc28e';
            ctx.beginPath(); ctx.arc(moonX+3, moonY-2, 3, 0, Math.PI*2); ctx.fill();
            // 月晕光环
            ctx.beginPath(); ctx.arc(moonX, moonY, 47, 0, Math.PI*2);
            ctx.strokeStyle = '#fae6b3';
            ctx.lineWidth = 1.2;
            ctx.shadowBlur = 18; ctx.stroke();
            ctx.shadowBlur = 0;
        }
        
        function animate() {
            mouseX += (targetX - mouseX) * 0.05;
            mouseY += (targetY - mouseY) * 0.05;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const w = canvas.width, h = canvas.height;
            // 星河流转
            stars.forEach(s => {
                let px = s.x, py = s.y;
                let alpha = s.baseAlpha + Math.sin(Date.now() * s.speed + s.x) * 0.2;
                ctx.beginPath(); ctx.arc(px, py, s.size, 0, Math.PI*2);
                ctx.fillStyle = `hsla(${s.hue}, 75%, 75%, ${Math.min(0.8, alpha)})`;
                ctx.fill();
                ctx.shadowBlur = 6; ctx.shadowColor = `hsl(${s.hue}, 80%, 70%)`;
                ctx.beginPath(); ctx.arc(px, py, s.size*0.65, 0, Math.PI*2); ctx.fill();
            });
            ctx.shadowBlur = 0;
            // 魔法尘粒
            magicDust.forEach(d => {
                d.x += d.speedX; d.y += d.speedY;
                if(d.x<0) d.x = w; if(d.x>w) d.x = 0; if(d.y<0) d.y = h; if(d.y>h) d.y = 0;
                ctx.beginPath(); ctx.arc(d.x, d.y, d.radius, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255, 215, 170, ${d.alpha+Math.sin(Date.now()*0.002)*0.2})`;
                ctx.fill();
            });
            // 流星
            if(shootingStars.length < 2 && Math.random()<0.012) shootingStars.push(spawnShootingStar());
            shootingStars = shootingStars.filter(ss => {
                ss.x += Math.cos(ss.angle) * ss.speed;
                ss.y += Math.sin(ss.angle) * ss.speed;
                ss.life--;
                if(ss.life <= 0) return false;
                const ex = ss.x - Math.cos(ss.angle)*ss.len;
                const ey = ss.y - Math.sin(ss.angle)*ss.len;
                const grad = ctx.createLinearGradient(ss.x, ss.y, ex, ey);
                grad.addColorStop(0, `rgba(255,240,180,${ss.life/45})`);
                grad.addColorStop(0.6, `rgba(200,180,250,${ss.life/55*0.6})`);
                ctx.strokeStyle = grad;
                ctx.lineWidth = 2.2;
                ctx.beginPath(); ctx.moveTo(ss.x, ss.y); ctx.lineTo(ex, ey); ctx.stroke();
                ctx.fillStyle = `rgba(255,250,200,0.9)`;
                ctx.beginPath(); ctx.arc(ss.x, ss.y, 2.5, 0, Math.PI*2); ctx.fill();
                return true;
            });
            drawMoon(ctx, w, h);
            // 高级星光魔法闪烁
            for(let i=0;i<70;i++) {
                if(Math.random()<0.03){
                    let fx = Math.random()*w, fy = Math.random()*h;
                    ctx.beginPath(); ctx.arc(fx, fy, Math.random()*3+1, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(255,220,150,${Math.random()*0.8})`;
                    ctx.fill();
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
    })();
    
    // ========== 数据管理 (保留原始内容) ==========
    const DATA_KEYS = { works: 'wxs_works', members: 'wxs_members', news: 'wxs_news' };
    const DATA_URL = 'data.json';
    const defaultWorks = [ { id: 1, title: '星月夜', author: '林月如', desc: '数字绘画作品，以星空为背景，融合东方意境与现代技法，梦中星月交织。', image: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=700&q=80' }, { id: 2, title: '城市脉搏', author: '陈远航', desc: '摄影系列作品，捕捉城市夜晚霓虹灯光与流动车轨，都市魔法时刻。', image: 'https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=700&q=80' } ];
    const defaultMembers = [ { id: 1, name: '林月如', role: '社长', number: 'WX-001', signature: '以画笔描绘万象，用心感受世界。', avatar: '' }, { id: 2, name: '陈远航', role: '副社长', number: 'WX-002', signature: '镜头之下，皆是故事。', avatar: '' } ];
    const defaultNews = [ { id: 1, date: '2024-12-20', title: '万象社年度作品展圆满落幕', summary: '本次展览共展出30余件社员作品，吸引了超过500名观众前来观展。', content: '<p>本次展览共展出30余件社员作品，吸引了超过500名观众前来观展，现场气氛热烈。</p><p>多件作品获得高度评价，为社团年度活动画上圆满句号。</p><img src="https://images.unsplash.com/photo-1460661419201-fd4cecdf8a8b?w=600&q=80" alt="展览现场">', image: 'https://images.unsplash.com/photo-1460661419201-fd4cecdf8a8b?w=400&q=80' }, { id: 2, date: '2024-11-08', title: '新社员招募正式启动', summary: '万象社面向所有创意爱好者开放招募。', content: '<p>万象社面向所有创意爱好者开放招募，欢迎绘画、摄影、动画、写作等各领域的伙伴加入我们。</p><p>报名通道已开启，详情请关注后续公告。</p>', image: '' } ];
    
    function getLocalData(key) { try { return JSON.parse(localStorage.getItem(DATA_KEYS[key])); } catch(e){return null;} }
    function setLocalData(key, data) { localStorage.setItem(DATA_KEYS[key], JSON.stringify(data)); }
    function initLocalData() { if (!getLocalData('works')) setLocalData('works', defaultWorks); if (!getLocalData('members')) setLocalData('members', defaultMembers); if (!getLocalData('news')) setLocalData('news', defaultNews);}
    async function loadCloudData() { try { const res = await fetch(DATA_URL); if(res.ok){ const cloud=await res.json(); if(cloud.works) setLocalData('works',cloud.works); if(cloud.members) setLocalData('members',cloud.members); if(cloud.news) setLocalData('news',cloud.news); } } catch(e){} }
    function exportDataJSON(){ const data={works:getLocalData('works'),members:getLocalData('members'),news:getLocalData('news')}; const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='data.json'; document.body.appendChild(a); a.click(); document.body.removeChild(a); showToast('✅ 星图已导出'); }
    
    let currentPage='home';
    function navigateTo(page){ if(currentPage===page && page!=='admin') return; document.querySelectorAll('.page-section').forEach(s=>s.classList.remove('active')); document.getElementById('page-'+page).classList.add('active'); currentPage=page; document.querySelectorAll('.nav-links a').forEach(a=>a.classList.remove('active')); const al=document.querySelector(`.nav-links a[data-page="${page}"]`); if(al) al.classList.add('active'); document.getElementById('navLinks').classList.remove('open'); if(page==='works') renderWorks(); if(page==='members') renderMembers(); if(page==='news') renderNews(); if(page==='admin') checkAdminStatus(); window.scrollTo({top:0,behavior:'smooth'});}
    function toggleMenu(){ document.getElementById('navLinks').classList.toggle('open'); }
    function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2600);}
    function esc(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML;}
    
    // 作品详情模态框
    function openWorkDetail(workId) {
        const works = getLocalData('works') || [];
        const work = works.find(w=>w.id === workId);
        if(!work) return;
        document.getElementById('workModalImage').src = work.image || 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600&q=80';
        document.getElementById('workModalTitle').innerText = work.title;
        document.getElementById('workModalAuthor').innerHTML = `✧ 创作者 · ${esc(work.author)} ✧`;
        document.getElementById('workModalDesc').innerHTML = `<i class="magic-detail">✨ 灵韵解读 ✨</i><br>${esc(work.desc)}`;
        document.getElementById('workModal').classList.add('show');
        document.body.style.overflow = 'hidden';
    }
    function closeWorkModal() { document.getElementById('workModal').classList.remove('show'); document.body.style.overflow = ''; }
    
    // 渲染作品加上点击事件
    function renderWorks() {
        const grid = document.getElementById('worksGrid');
        const works = getLocalData('works') || [];
        if(!works.length){ grid.innerHTML='<p style="text-align:center;">暂无星绘作品</p>'; return; }
        grid.innerHTML = works.map(w => `<div class="work-card" onclick="openWorkDetail(${w.id})"><img class="card-img" src="${esc(w.image)}" alt="${esc(w.title)}" onerror="this.src='https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&q=60'"><div class="card-body"><h3>${esc(w.title)}</h3><p class="author">✨ ${esc(w.author)}</p><p class="desc">${esc(w.desc)}</p></div></div>`).join('');
    }
    function renderMembers(){ const members=getLocalData('members')||[]; const grid=document.getElementById('membersGrid'); if(!members.length){grid.innerHTML='<p>暂无成员</p>';return;} grid.innerHTML=members.map(m=>{const initial=(m.name||'?').charAt(0); const avatarHTML=m.avatar?`<img src="${esc(m.avatar)}" onerror="this.parentElement.innerHTML='${initial}'">`:initial; return `<div class="member-name-card" onclick="openMemberModal('${m.id}')"><div class="avatar-dot">${avatarHTML}</div><div class="member-name">${esc(m.name)}</div><div class="member-role-hint">${esc(m.role)}</div></div>`;}).join('');}
    function openMemberModal(id){ const m=getLocalData('members').find(m=>String(m.id)===String(id)); if(!m) return; const av=document.getElementById('modalAvatar'); if(m.avatar) av.innerHTML=`<img src="${esc(m.avatar)}">`; else av.textContent=(m.name||'?').charAt(0); document.getElementById('modalName').textContent=m.name; document.getElementById('modalRole').textContent='✦ '+m.role; document.getElementById('modalId').textContent='星印：'+m.number; document.getElementById('modalSignature').textContent='「'+m.signature+'」'; document.getElementById('memberModal').classList.add('show'); }
    function closeMemberModal(){ document.getElementById('memberModal').classList.remove('show'); document.body.style.overflow='';}
    function renderNews(){ const news=getLocalData('news')||[]; const grid=document.getElementById('newsList'); if(!news.length){grid.innerHTML='<p>暂无星闻</p>';return;} grid.innerHTML=news.map(n=>{ const imgHTML=n.image?`<img class="news-img" src="${esc(n.image)}" onerror="this.style.display='none'">`:''; const summary=n.summary||(n.content?n.content.replace(/<[^>]*>/g,'').substring(0,70):''); return `<div class="news-card" onclick="openArticle(${n.id})">${imgHTML}<div class="news-body"><div class="news-date">📅 ${esc(n.date)}</div><h3>${esc(n.title)}</h3><p class="news-summary">${esc(summary)}</p></div></div>`;}).join('');}
    function openArticle(id){ const a=getLocalData('news').find(n=>n.id===id); if(a){ document.getElementById('articleDate').innerHTML='📅 '+esc(a.date); document.getElementById('articleTitle').innerText=a.title; document.getElementById('articleBody').innerHTML=a.content||''; document.getElementById('articleModal').classList.add('show');} }
    function closeArticleModal(){ document.getElementById('articleModal').classList.remove('show'); document.body.style.overflow='';}
    
    // Admin 完整保留
    const ADMIN_PW='wanxiang2024';
    function checkAdminStatus(){ const logged=sessionStorage.getItem('wxs_admin'); document.getElementById('adminLoginArea').style.display=logged==='true'?'none':'block'; document.getElementById('adminPanelArea').style.display=logged==='true'?'block':'none'; if(logged==='true') switchAdminTab('works');}
    function adminLogin(){ if(document.getElementById('adminPassword').value===ADMIN_PW){ sessionStorage.setItem('wxs_admin','true'); checkAdminStatus(); showToast('✅ 星钥验证成功'); } else showToast('❌ 星钥错误');}
    function adminLogout(){ sessionStorage.removeItem('wxs_admin'); checkAdminStatus();}
    let adminTab='works';
    function switchAdminTab(tab){ adminTab=tab; document.querySelectorAll('[id^="adminTab"]').forEach(b=>b.style.boxShadow='none'); const btn=document.getElementById('adminTab'+tab.charAt(0).toUpperCase()+tab.slice(1)); if(btn) btn.style.boxShadow='0 0 14px rgba(200,180,220,0.6)'; renderAdminContent();}
    function renderAdminContent(){const area=document.getElementById('adminContentArea'); const data=getLocalData(adminTab)||[]; const cfg={works:{title:'作品',fields:['title','author','desc','image'],fieldLabels:['标题','作者','描述','图片URL']},members:{title:'成员',fields:['name','role','number','signature','avatar'],fieldLabels:['昵称','职位','编号','签名','头像URL']},news:{title:'资讯',fields:['title','date','summary','content','image'],fieldLabels:['标题','日期','摘要','正文','封面URL']}}[adminTab]; let html=`<h3>${cfg.title}列表 (${data.length})</h3><table class="admin-table"><thead><tr><th>ID</th>${cfg.fieldLabels.map(l=>`<th>${l}</th>`).join('')}<th>操作</th></tr></thead><tbody>`; data.forEach(item=>{ html+=`<tr><td>${item.id}</td>`; cfg.fields.forEach(f=>{ const v=item[f]||''; html+=`<td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(String(v))}">${esc(String(v).substring(0,35))}</td>`;}); html+=`<td><button class="btn btn-sm" onclick="editItem('${adminTab}',${item.id})">✏️</button> <button class="btn btn-sm btn-danger" onclick="deleteItem('${adminTab}',${item.id})">🗑</button></td></tr>`;}); html+=`</tbody></table><button class="btn btn-gold" onclick="addItem('${adminTab}')">＋ 新增星作</button><div id="editFormArea" style="margin-top:20px;display:none;"></div>`; area.innerHTML=html;}
    function getNextId(tab){ const d=getLocalData(tab)||[]; return d.length?Math.max(...d.map(i=>i.id))+1:1;}
    function addItem(tab){ const cfgMap={works:{fields:['title','author','desc','image'],labels:['标题','作者','描述','图片URL']},members:{fields:['name','role','number','signature','avatar'],labels:['昵称','职位','编号','签名','头像URL']},news:{fields:['title','date','summary','content','image'],labels:['标题','日期','摘要','正文','封面URL']}}; const {fields,labels}=cfgMap[tab]; let h='<h4>新增条目</h4>'; fields.forEach((f,i)=>{ const isTextarea=['desc','summary','content','signature'].includes(f); h+=`<label>${labels[i]}</label>`; h+=isTextarea?`<textarea id="f_${f}" rows="3"></textarea>`:`<input id="f_${f}" value="${tab==='news'&&f==='date'?new Date().toISOString().split('T')[0]:''}">`; if(f==='content') h+=`<button type="button" class="btn btn-sm" onclick="insertImageToField('f_content')">📷 插入图片</button>`;}); h+=`<br><button class="btn btn-gold" onclick="saveNew('${tab}')">保存</button> <button class="btn" onclick="document.getElementById('editFormArea').style.display='none'">取消</button>`; const fa=document.getElementById('editFormArea'); fa.style.display='block'; fa.innerHTML=h;}
    function editItem(tab,id){ const data=getLocalData(tab); const item=data.find(d=>d.id===id); if(!item)return; const cfgMap={works:{fields:['title','author','desc','image'],labels:['标题','作者','描述','图片URL']},members:{fields:['name','role','number','signature','avatar'],labels:['昵称','职位','编号','签名','头像URL']},news:{fields:['title','date','summary','content','image'],labels:['标题','日期','摘要','正文','封面URL']}}; const{fields,labels}=cfgMap[tab]; let h=`<h4>编辑 ID ${id}</h4>`; fields.forEach((f,i)=>{ const val=item[f]||''; const isTextarea=['desc','summary','content','signature'].includes(f); h+=`<label>${labels[i]}</label>`; h+=isTextarea?`<textarea id="f_${f}" rows="3">${esc(String(val))}</textarea>`:`<input id="f_${f}" value="${esc(String(val))}">`; if(f==='content') h+=`<button type="button" class="btn btn-sm" onclick="insertImageToField('f_content')">📷 插入图片</button>`;}); h+=`<br><button class="btn btn-gold" onclick="saveEdit('${tab}',${id})">更新</button> <button class="btn" onclick="document.getElementById('editFormArea').style.display='none'">取消</button>`; const fa=document.getElementById('editFormArea'); fa.style.display='block'; fa.innerHTML=h;}
    function insertImageToField(fieldId){ const url=prompt('图片链接 URL:'); if(url){ const imgTag=`<img src="${url}" alt="插图">`; const ta=document.getElementById(fieldId); if(ta){ const start=ta.selectionStart; const end=ta.selectionEnd; const txt=ta.value; ta.value=txt.substring(0,start)+imgTag+txt.substring(end); ta.focus();}}}
    function saveNew(tab){ const cfgMap={works:['title','author','desc','image'],members:['name','role','number','signature','avatar'],news:['title','date','summary','content','image']}; const fields=cfgMap[tab]; const obj={id:getNextId(tab)}; fields.forEach(f=>{const el=document.getElementById('f_'+f); if(el) obj[f]=el.value;}); if(!obj[fields[0]]){showToast('请填写必要字段');return;} const data=getLocalData(tab)||[]; data.push(obj); setLocalData(tab,data); document.getElementById('editFormArea').style.display='none'; renderAdminContent(); refreshPage(tab); showToast('已保存（本地）');}
    function saveEdit(tab,id){ const cfgMap={works:['title','author','desc','image'],members:['name','role','number','signature','avatar'],news:['title','date','summary','content','image']}; const fields=cfgMap[tab]; const data=getLocalData(tab)||[]; const idx=data.findIndex(d=>d.id===id); if(idx<0)return; fields.forEach(f=>{const el=document.getElementById('f_'+f); if(el) data[idx][f]=el.value;}); setLocalData(tab,data); document.getElementById('editFormArea').style.display='none'; renderAdminContent(); refreshPage(tab); showToast('已更新');}
    function deleteItem(tab,id){ if(confirm('确定删除此条目？')){ let data=getLocalData(tab)||[]; data=data.filter(d=>d.id!==id); setLocalData(tab,data); renderAdminContent(); refreshPage(tab); showToast('已删除');}}
    function refreshPage(tab){ if(tab==='works') renderWorks(); if(tab==='members') renderMembers(); if(tab==='news') renderNews();}
    window.onload=async ()=>{ initLocalData(); await loadCloudData(); renderWorks(); renderMembers(); renderNews(); document.getElementById('page-home').classList.add('active'); checkAdminStatus(); document.getElementById('workModal').addEventListener('click',function(e){if(e.target===this) closeWorkModal();}); document.getElementById('memberModal').addEventListener('click',function(e){if(e.target===this) closeMemberModal();}); document.getElementById('articleModal').addEventListener('click',function(e){if(e.target===this) closeArticleModal();}); document.addEventListener('keydown',(e)=>{if(e.key==='Escape'){ closeWorkModal(); closeMemberModal(); closeArticleModal();}}); };
</script>
