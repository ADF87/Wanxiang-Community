<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>万象社 - 万般景象，皆汇于此</title>
    <style>
        :root {
            --bg-deep: #0a0a14;
            --bg-card: rgba(20, 20, 40, 0.85);
            --bg-card-hover: rgba(30, 30, 55, 0.9);
            --gold: #d4a574;
            --gold-light: #e8c9a0;
            --text: #e0d8cf;
            --text-light: #b0a8a0;
            --border: rgba(255, 255, 255, 0.1);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --shadow-gold: 0 0 30px rgba(212, 167, 116, 0.3);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --font-display: 'Georgia', 'Noto Serif SC', 'STSong', 'Songti SC', serif;
            --font-body: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: var(--font-body);
            background: var(--bg-deep);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        #starsCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .nebula-glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.06;
            pointer-events: none;
            z-index: 0;
            animation: nebulaDrift 20s ease-in-out infinite;
        }
        .nebula-glow.n1 {
            width: 500px;
            height: 500px;
            background: #4a3a8a;
            top: -150px;
            left: -100px;
        }
        .nebula-glow.n2 {
            width: 400px;
            height: 400px;
            background: #8a5a3a;
            bottom: -100px;
            right: -80px;
            animation-delay: -7s;
        }
        .nebula-glow.n3 {
            width: 350px;
            height: 350px;
            background: #3a5a8a;
            top: 40%;
            left: 50%;
            animation-delay: -14s;
        }
        @keyframes nebulaDrift {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(40px, -30px) scale(1.15);
            }
            66% {
                transform: translate(-25px, 20px) scale(0.9);
            }
        }

        .app-container {
            position: relative;
            z-index: 1;
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .navbar {
            position: sticky;
            top: 16px;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 28px;
            margin-top: 20px;
            background: rgba(16, 16, 30, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 50px;
            box-shadow: var(--shadow);
            transition: all var(--transition);
        }
        .navbar:hover {
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
        }
        .navbar .logo {
            font-family: var(--font-display);
            font-size: 1.6rem;
            font-weight: bold;
            letter-spacing: 3px;
            background: linear-gradient(135deg, var(--gold-light), var(--gold), #b8895a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
            transition: all var(--transition);
        }
        .nav-links {
            display: flex;
            list-style: none;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .nav-links li a {
            color: var(--text-light);
            text-decoration: none;
            padding: 9px 18px;
            border-radius: 30px;
            font-size: 0.95rem;
            letter-spacing: 1px;
            transition: all var(--transition);
            cursor: pointer;
            white-space: nowrap;
        }
        .nav-links li a:hover,
        .nav-links li a.active {
            color: #fff;
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 20px rgba(180, 160, 220, 0.2);
        }
        .nav-links li a.active::after {
            content: '';
            position: absolute;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 2px;
            background: var(--gold);
            border-radius: 2px;
        }
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
            z-index: 101;
        }
        .hamburger span {
            width: 26px;
            height: 2.5px;
            background: var(--text);
            border-radius: 3px;
        }

        .page-section {
            display: none;
            animation: fadeSlideIn 0.6s ease-out forwards;
            padding: 30px 0 60px;
        }
        .page-section.active {
            display: block;
        }
        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section-header {
            text-align: center;
            margin-bottom: 50px;
        }
        .section-header h1 {
            font-family: var(--font-display);
            font-size: 2.8rem;
            letter-spacing: 4px;
            color: #fff;
            margin-bottom: 8px;
            background: linear-gradient(180deg, #fff 30%, #c0b0a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .section-header .subtitle {
            color: var(--text-light);
            letter-spacing: 3px;
            font-size: 0.95rem;
        }
        .section-header .divider {
            width: 60px;
            height: 2px;
            background: var(--gold);
            margin: 16px auto 0;
            border-radius: 2px;
            opacity: 0.7;
        }

        .works-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 28px;
        }
        .work-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: var(--shadow);
            position: relative;
        }
        .work-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-gold), 0 16px 40px rgba(0, 0, 0, 0.5);
            border-color: rgba(212, 167, 116, 0.4);
            background: var(--bg-card-hover);
        }
        .work-card .card-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
            transition: transform 0.6s ease;
        }
        .work-card:hover .card-img {
            transform: scale(1.06);
        }
        .work-card .card-body {
            padding: 20px;
        }
        .work-card .card-body h3 {
            font-family: var(--font-display);
            font-size: 1.2rem;
            color: #fff;
            margin-bottom: 6px;
            letter-spacing: 2px;
        }
        .work-card .card-body .author {
            color: var(--gold-light);
            font-size: 0.9rem;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .work-card .card-body .desc {
            color: var(--text-light);
            font-size: 0.85rem;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .work-card .card-shine {
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.03), transparent);
            transition: left 0.8s ease;
            pointer-events: none;
        }
        .work-card:hover .card-shine {
            left: 150%;
        }

        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
        .member-name-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 24px 16px;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: var(--shadow);
        }
        .member-name-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-gold), 0 12px 35px rgba(0, 0, 0, 0.5);
            border-color: rgba(212, 167, 116, 0.5);
            background: var(--bg-card-hover);
        }
        .member-name-card .avatar-dot {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin: 0 auto 12px;
            background: linear-gradient(135deg, #4a3a6a, #6a5a8a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-size: 1.5rem;
            color: #fff;
            letter-spacing: 2px;
        }
        .member-name-card .member-name {
            font-family: var(--font-display);
            font-size: 1.1rem;
            color: #fff;
            letter-spacing: 2px;
        }
        .member-name-card .member-role-hint {
            font-size: 0.8rem;
            color: var(--gold-light);
            letter-spacing: 1px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.show {
            opacity: 1;
            pointer-events: all;
        }
        .modal-panel {
            background: rgba(22, 22, 42, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: var(--radius);
            padding: 40px 32px;
            max-width: 480px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            transform: translateY(20px) scale(0.95);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(20px);
            position: relative;
        }
        .modal-overlay.show .modal-panel {
            transform: translateY(0) scale(1);
        }
        .modal-panel .modal-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, #5a4a7a, #8a7aaa);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-size: 2.2rem;
            color: #fff;
            box-shadow: 0 0 40px rgba(150, 130, 200, 0.4);
        }
        .modal-panel h2 {
            font-family: var(--font-display);
            font-size: 1.8rem;
            color: #fff;
            letter-spacing: 3px;
        }
        .modal-panel .modal-role {
            color: var(--gold-light);
            letter-spacing: 2px;
            font-size: 0.95rem;
            margin-bottom: 6px;
        }
        .modal-panel .modal-id {
            color: var(--text-light);
            font-size: 0.85rem;
            letter-spacing: 1px;
            margin-bottom: 16px;
            opacity: 0.8;
        }
        .modal-panel .modal-signature {
            color: #ccc;
            font-style: italic;
            letter-spacing: 2px;
            padding: 12px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            margin-top: 8px;
            line-height: 1.6;
        }
        .modal-close {
            position: absolute;
            top: 12px;
            right: 18px;
            background: none;
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            opacity: 0.7;
        }
        .modal-close:hover {
            opacity: 1;
        }

        .news-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .news-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 22px 26px;
            transition: all var(--transition);
            box-shadow: var(--shadow);
        }
        .news-item:hover {
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            transform: translateX(4px);
        }
        .news-item .news-date {
            font-size: 0.8rem;
            color: var(--gold-light);
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        .news-item h3 {
            font-family: var(--font-display);
            color: #fff;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }
        .news-item p {
            color: var(--text-light);
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .site-footer {
            text-align: center;
            padding: 30px 0;
            color: var(--text-light);
            letter-spacing: 2px;
            font-size: 0.8rem;
            opacity: 0.6;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(30, 30, 50, 0.9);
            color: #fff;
            padding: 12px 28px;
            border-radius: 30px;
            z-index: 300;
            letter-spacing: 2px;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .admin-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 30px;
            margin-top: 30px;
            box-shadow: var(--shadow);
        }
        .admin-panel h2 {
            color: #fff;
            letter-spacing: 3px;
            margin-bottom: 20px;
            font-family: var(--font-display);
        }
        .admin-panel input,
        .admin-panel textarea {
            width: 100%;
            padding: 12px 16px;
            margin: 8px 0 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: var(--radius-sm);
            color: #fff;
            font-size: 0.95rem;
            font-family: var(--font-body);
            letter-spacing: 1px;
            transition: all 0.3s;
            resize: vertical;
        }
        .admin-panel input:focus,
        .admin-panel textarea:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(212, 167, 116, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }
        .admin-panel label {
            color: var(--text-light);
            letter-spacing: 2px;
            font-size: 0.85rem;
        }
        .btn {
            display: inline-block;
            padding: 12px 28px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            cursor: pointer;
            letter-spacing: 2px;
            font-size: 0.9rem;
            transition: all var(--transition);
            font-family: var(--font-body);
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.14);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 25px rgba(200, 180, 220, 0.25);
            transform: translateY(-2px);
        }
        .btn-gold {
            border-color: var(--gold);
            background: rgba(212, 167, 116, 0.15);
            color: var(--gold-light);
        }
        .btn-gold:hover {
            background: rgba(212, 167, 116, 0.25);
            box-shadow: 0 0 30px rgba(212, 167, 116, 0.35);
        }
        .btn-danger {
            border-color: #c44;
            color: #e88;
            background: rgba(200, 60, 60, 0.1);
        }
        .btn-sm {
            padding: 7px 16px;
            font-size: 0.8rem;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
            font-size: 0.9rem;
        }
        .admin-table th,
        .admin-table td {
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            letter-spacing: 1px;
            color: var(--text);
        }
        .admin-table th {
            color: var(--gold-light);
            letter-spacing: 2px;
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 60px;
                left: 10px;
                right: 10px;
                background: rgba(16, 16, 30, 0.95);
                border: 1px solid var(--border);
                border-radius: 20px;
                padding: 16px;
                backdrop-filter: blur(20px);
                box-shadow: var(--shadow);
            }
            .nav-links.open {
                display: flex;
            }
            .hamburger {
                display: flex;
            }
            .section-header h1 {
                font-size: 2rem;
            }
            .works-grid {
                grid-template-columns: 1fr;
            }
            .members-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
        }
    </style>
</head>
<body>

    <div class="nebula-glow n1"></div>
    <div class="nebula-glow n2"></div>
    <div class="nebula-glow n3"></div>
    <canvas id="starsCanvas"></canvas>
    <div class="toast" id="toast"></div>

    <div class="app-container">
        <nav class="navbar" id="navbar">
            <div class="logo" onclick="navigateTo('home')">万象社</div>
            <div class="hamburger" id="hamburger" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </div>
            <ul class="nav-links" id="navLinks">
                <li><a onclick="navigateTo('home')" class="active" data-page="home">🏠 首页</a></li>
                <li><a onclick="navigateTo('works')" data-page="works">🎨 作品集</a></li>
                <li><a onclick="navigateTo('members')" data-page="members">👥 成员</a></li>
                <li><a onclick="navigateTo('news')" data-page="news">📰 资讯</a></li>
                <li><a onclick="navigateTo('admin')" data-page="admin">⚙️ 管理</a></li>
            </ul>
        </nav>

        <section class="page-section active" id="page-home">
            <div class="section-header">
                <h1>万 象 社</h1>
                <p class="subtitle">万般景象，皆汇于此</p>
                <div class="divider"></div>
            </div>
            <div style="text-align:center;max-width:700px;margin:0 auto;color:var(--text-light);letter-spacing:2px;line-height:2;">
                <p style="font-size:1.1rem;">欢迎来到<span style="color:var(--gold-light);">万象社</span></p>
                <p>汇聚创意与灵感，展示社员精美作品</p>
                <p>✨ 仰望星空，脚踏实地 ✨</p>
            </div>
        </section>

        <section class="page-section" id="page-works">
            <div class="section-header">
                <h1>作 品 集</h1>
                <p class="subtitle">社员创作 · 精彩呈现</p>
                <div class="divider"></div>
            </div>
            <div class="works-grid" id="worksGrid"></div>
        </section>

        <section class="page-section" id="page-members">
            <div class="section-header">
                <h1>成 员 名 录</h1>
                <p class="subtitle">点击名字卡片查看详情</p>
                <div class="divider"></div>
            </div>
            <div class="members-grid" id="membersGrid"></div>
        </section>

        <section class="page-section" id="page-news">
            <div class="section-header">
                <h1>社 区 资 讯</h1>
                <p class="subtitle">最新动态 · 一手掌握</p>
                <div class="divider"></div>
            </div>
            <div class="news-list" id="newsList"></div>
        </section>

        <section class="page-section" id="page-admin">
            <div class="section-header">
                <h1>后 台 管 理</h1>
                <p class="subtitle">数据维护 · JSON 同步</p>
                <div class="divider"></div>
            </div>
            <div id="adminLoginArea" style="max-width:400px;margin:80px auto;text-align:center;">
                <h3 style="color:#fff;letter-spacing:3px;margin-bottom:16px;">管理员登录</h3>
                <input type="password" id="adminPassword" placeholder="请输入管理密码" style="text-align:center;width:100%;padding:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.2);border-radius:10px;color:#fff;">
                <br><button class="btn btn-gold" onclick="adminLogin()" style="margin-top:12px;">登 录</button>
            </div>
            <div id="adminPanelArea" class="admin-panel" style="display:none;">
                <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;align-items:center;">
                    <button class="btn" onclick="switchAdminTab('works')" id="adminTabWorks">📦 作品管理</button>
                    <button class="btn" onclick="switchAdminTab('members')" id="adminTabMembers">👤 成员管理</button>
                    <button class="btn" onclick="switchAdminTab('news')" id="adminTabNews">📰 资讯管理</button>
                    <button class="btn btn-gold btn-sm" onclick="exportDataJSON()" style="margin-left:auto;">💾 导出 data.json</button>
                    <button class="btn btn-danger btn-sm" onclick="adminLogout()">退出登录</button>
                </div>
                <div id="adminContentArea"></div>
            </div>
        </section>

        <div class="site-footer">
            <p>© 2026 万象社 · 万般景象，皆汇于此</p>
        </div>
    </div>

    <div class="modal-overlay" id="memberModal">
        <div class="modal-panel">
            <button class="modal-close" onclick="closeMemberModal()">✕</button>
            <div class="modal-avatar" id="modalAvatar">?</div>
            <h2 id="modalName"></h2>
            <p class="modal-role" id="modalRole"></p>
            <p class="modal-id" id="modalId"></p>
            <p class="modal-signature" id="modalSignature"></p>
        </div>
    </div>

    <script>
        // ==================== 星空特效 ====================
        (function() {
            const canvas = document.getElementById('starsCanvas');
            const ctx = canvas.getContext('2d');
            let stars = [],
                shootingStars = [];
            let mouseX = 0,
                mouseY = 0,
                targetMouseX = 0,
                targetMouseY = 0;
            const STAR_COUNT = 260;

            function resize() { canvas.width = window.innerWidth;
                canvas.height = window.innerHeight; }
            resize();
            window.addEventListener('resize', () => { resize();
                stars = [];
                for (let i = 0; i < STAR_COUNT; i++) stars.push(createStar()); });

            document.addEventListener('mousemove', (e) => { targetMouseX = e.clientX;
                targetMouseY = e.clientY; });

            function createStar() {
                return {
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2.8 + 0.4,
                    baseAlpha: Math.random() * 0.7 + 0.3,
                    twinkleSpeed: Math.random() * 0.02 + 0.005,
                    twinkleOffset: Math.random() * Math.PI * 2,
                    hue: Math.random() < 0.15 ? 40 + Math.random() * 20 : 220 + Math.random() * 60
                };
            }
            for (let i = 0; i < STAR_COUNT; i++) stars.push(createStar());

            function spawnShootingStar() {
                return {
                    x: Math.random() * canvas.width * 0.8,
                    y: Math.random() * canvas.height * 0.4,
                    len: Math.random() * 100 + 60,
                    speed: Math.random() * 8 + 6,
                    angle: Math.PI / 4 + Math.random() * 0.3,
                    life: Math.random() * 60 + 40,
                    maxLife: 0,
                    alpha: 1
                };
            }

            function animate() {
                mouseX += (targetMouseX - mouseX) * 0.04;
                mouseY += (targetMouseY - mouseY) * 0.04;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const now = Date.now() * 0.001;
                stars.forEach(s => {
                    const px = (mouseX - canvas.width / 2) * s.size * 0.015;
                    const py = (mouseY - canvas.height / 2) * s.size * 0.015;
                    const sx = s.x + px,
                        sy = s.y + py;
                    const twinkle = Math.sin(now * s.twinkleSpeed * 60 + s.twinkleOffset) * 0.5 + 0.5;
                    const alpha = s.baseAlpha * (0.6 + twinkle * 0.4);
                    const glow = ctx.createRadialGradient(sx, sy, 0, sx, sy, s.size * 3);
                    glow.addColorStop(0, `hsla(${s.hue},60%,80%,${alpha})`);
                    glow.addColorStop(0.5, `hsla(${s.hue},40%,70%,${alpha*0.4})`);
                    glow.addColorStop(1, 'transparent');
                    ctx.fillStyle = glow;
                    ctx.beginPath();
                    ctx.arc(sx, sy, s.size * 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = `hsla(${s.hue},30%,95%,${alpha})`;
                    ctx.beginPath();
                    ctx.arc(sx, sy, s.size * 0.7, 0, Math.PI * 2);
                    ctx.fill();
                });
                if (shootingStars.length < 2 && Math.random() < 0.012) shootingStars.push(
                spawnShootingStar());
                shootingStars = shootingStars.filter(ss => {
                    ss.x += Math.cos(ss.angle) * ss.speed;
                    ss.y += Math.sin(ss.angle) * ss.speed;
                    ss.life--;
                    ss.alpha = ss.life / ss.maxLife;
                    if (ss.life <= 0) return false;
                    const ex = ss.x - Math.cos(ss.angle) * ss.len;
                    const ey = ss.y - Math.sin(ss.angle) * ss.len;
                    const grad = ctx.createLinearGradient(ss.x, ss.y, ex, ey);
                    grad.addColorStop(0, `rgba(255,255,255,${ss.alpha})`);
                    grad.addColorStop(0.3, `rgba(200,210,255,${ss.alpha*0.7})`);
                    grad.addColorStop(1, 'rgba(255,255,255,0)');
                    ctx.strokeStyle = grad;
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(ss.x, ss.y);
                    ctx.lineTo(ex, ey);
                    ctx.stroke();
                    ctx.fillStyle = `rgba(255,255,255,${ss.alpha})`;
                    ctx.beginPath();
                    ctx.arc(ss.x, ss.y, 2, 0, Math.PI * 2);
                    ctx.fill();
                    return true;
                });
                requestAnimationFrame(animate);
            }
            animate();
        })();

        // ==================== 数据管理 ====================
        const DATA_KEYS = { works: 'wxs_works', members: 'wxs_members', news: 'wxs_news' };
        const DATA_URL = 'data.json'; // 云端 JSON 文件路径

        const defaultWorks = [
            { id: 1, title: '星月夜', author: '林月如', desc: '数字绘画作品，以星空为背景，融合东方意境与现代技法。',
                image: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600&q=80' },
            { id: 2, title: '城市脉搏', author: '陈远航', desc: '摄影系列作品，捕捉城市夜晚霓虹灯光与流动车轨。',
                image: 'https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=600&q=80' },
        ];
        const defaultMembers = [
            { id: 1, name: '林月如', role: '社长', number: 'WX-001', signature: '以画笔描绘万象，用心感受世界。' },
            { id: 2, name: '陈远航', role: '副社长', number: 'WX-002', signature: '镜头之下，皆是故事。' },
        ];
        const defaultNews = [
            { id: 1, date: '2024-12-20', title: '万象社年度作品展圆满落幕', content: '本次展览共展出30余件社员作品，吸引了超过500名观众前来观展。' },
            { id: 2, date: '2024-11-08', title: '新社员招募正式启动', content: '万象社面向所有创意爱好者开放招募，欢迎加入我们。' },
        ];

        function getLocalData(key) {
            try { const raw = localStorage.getItem(DATA_KEYS[key]); return raw ? JSON.parse(raw) :
                    null; } catch (e) { return null; }
        }

        function setLocalData(key, data) { localStorage.setItem(DATA_KEYS[key], JSON.stringify(data)); }

        function initLocalData() {
            if (!getLocalData('works')) setLocalData('works', defaultWorks);
            if (!getLocalData('members')) setLocalData('members', defaultMembers);
            if (!getLocalData('news')) setLocalData('news', defaultNews);
        }

        // ==================== 尝试从云端加载 JSON ====================
        async function loadCloudData() {
            try {
                const res = await fetch(DATA_URL);
                if (!res.ok) return false;
                const cloud = await res.json();
                if (cloud.works) setLocalData('works', cloud.works);
                if (cloud.members) setLocalData('members', cloud.members);
                if (cloud.news) setLocalData('news', cloud.news);
                console.log('✅ 已从云端 data.json 同步最新数据');
                return true;
            } catch (e) {
                console.log('ℹ️ 未找到云端数据，使用本地存储');
                return false;
            }
        }

        // ==================== 导出 data.json ====================
        function exportDataJSON() {
            const data = {
                works: getLocalData('works') || [],
                members: getLocalData('members') || [],
                news: getLocalData('news') || [],
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'data.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('✅ data.json 已下载！上传到 GitHub 仓库即可同步给所有人');
        }

        // ==================== 导航 ====================
        let currentPage = 'home';

        function navigateTo(page) {
            if (currentPage === page && page !== 'admin') return;
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            const ns = document.getElementById('page-' + page);
            if (ns) ns.classList.add('active');
            currentPage = page;
            document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
            const al = document.querySelector(`.nav-links a[data-page="${page}"]`);
            if (al) al.classList.add('active');
            document.getElementById('navLinks').classList.remove('open');
            if (page === 'works') renderWorks();
            if (page === 'members') renderMembers();
            if (page === 'news') renderNews();
            if (page === 'admin') checkAdminStatus();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleMenu() { document.getElementById('navLinks').classList.toggle('open'); }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._t);
            t._t = setTimeout(() => t.classList.remove('show'), 2500);
        }

        // ==================== 渲染函数 ====================
        function renderWorks() {
            const grid = document.getElementById('worksGrid');
            const works = getLocalData('works') || [];
            if (!works.length) { grid.innerHTML =
                    '<p style="text-align:center;color:var(--text-light);grid-column:1/-1;">暂无作品</p>'; return; }
            grid.innerHTML = works.map(w => `
            <div class="work-card">
              <div class="card-shine"></div>
              <img class="card-img" src="${esc(w.image)}" alt="${esc(w.title)}" onerror="this.src='https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&q=60'">
              <div class="card-body">
                <h3>${esc(w.title)}</h3>
                <p class="author">✧ ${esc(w.author)}</p>
                <p class="desc">${esc(w.desc)}</p>
              </div>
            </div>`).join('');
        }

        function renderMembers() {
            const grid = document.getElementById('membersGrid');
            const members = getLocalData('members') || [];
            if (!members.length) { grid.innerHTML =
                    '<p style="text-align:center;color:var(--text-light);grid-column:1/-1;">暂无成员</p>'; return; }
            grid.innerHTML = members.map(m => `
            <div class="member-name-card" onclick="openMemberModal('${m.id}')">
              <div class="avatar-dot">${esc((m.name||'?').charAt(0))}</div>
              <div class="member-name">${esc(m.name)}</div>
              <div class="member-role-hint">${esc(m.role)}</div>
            </div>`).join('');
        }

        function openMemberModal(id) {
            const members = getLocalData('members') || [];
            const m = members.find(m => String(m.id) === String(id));
            if (!m) return;
            document.getElementById('modalAvatar').textContent = (m.name || '?').charAt(0);
            document.getElementById('modalName').textContent = m.name || '';
            document.getElementById('modalRole').textContent = '✦ ' + (m.role || '');
            document.getElementById('modalId').textContent = '编号：' + (m.number || '');
            document.getElementById('modalSignature').textContent = '「' + (m.signature || '') + '」';
            document.getElementById('memberModal').classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closeMemberModal() { document.getElementById('memberModal').classList.remove('show');
            document.body.style.overflow = ''; }
        document.getElementById('memberModal').addEventListener('click', function(e) { if (e.target === this)
                closeMemberModal(); });
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeMemberModal(); });

        function renderNews() {
            const list = document.getElementById('newsList');
            const news = getLocalData('news') || [];
            if (!news.length) { list.innerHTML =
                    '<p style="text-align:center;color:var(--text-light);">暂无资讯</p>'; return; }
            list.innerHTML = news.map(n => `
            <div class="news-item">
              <div class="news-date">📅 ${esc(n.date)}</div>
              <h3>${esc(n.title)}</h3>
              <p>${esc(n.content)}</p>
            </div>`).join('');
        }

        function esc(s) { const d = document.createElement('div');
            d.textContent = s || ''; return d.innerHTML; }

        // ==================== 后台管理 ====================
        const ADMIN_PW = 'wanxiang2024';

        function checkAdminStatus() {
            const logged = sessionStorage.getItem('wxs_admin');
            document.getElementById('adminLoginArea').style.display = logged === 'true' ? 'none' : 'block';
            document.getElementById('adminPanelArea').style.display = logged === 'true' ? 'block' : 'none';
            if (logged === 'true') switchAdminTab('works');
        }

        function adminLogin() {
            if (document.getElementById('adminPassword').value === ADMIN_PW) {
                sessionStorage.setItem('wxs_admin', 'true');
                checkAdminStatus();
                showToast('✅ 登录成功');
            } else showToast('❌ 密码错误');
        }

        function adminLogout() { sessionStorage.removeItem('wxs_admin');
            checkAdminStatus();
            showToast('已退出'); }

        let adminTab = 'works';

        function switchAdminTab(tab) {
            adminTab = tab;
            document.querySelectorAll('[id^="adminTab"]').forEach(b => b.style.boxShadow = 'none');
            const btn = document.getElementById('adminTab' + tab.charAt(0).toUpperCase() + tab.slice(1));
            if (btn) btn.style.boxShadow = '0 0 20px rgba(200,180,220,0.4)';
            renderAdminContent();
        }

        function renderAdminContent() {
            const area = document.getElementById('adminContentArea');
            const data = getLocalData(adminTab) || [];
            const cfg = {
                works: { title: '作品', fields: ['title', 'author', 'desc', 'image'],
                fieldLabels: ['标题', '作者', '描述', '图片URL'] },
                members: { title: '成员', fields: ['name', 'role', 'number', 'signature'],
                    fieldLabels: ['昵称', '职位', '编号', '签名'] },
                news: { title: '资讯', fields: ['title', 'date', 'content'], fieldLabels: ['标题', '日期', '内容'] },
            } [adminTab];
            let html =
                `<h3>${cfg.title}列表 <span style="font-size:0.7rem;color:var(--text-light);">(共${data.length}条)</span></h3>`;
            html +=
                `<table class="admin-table"><thead><tr><th>ID</th>${cfg.fieldLabels.map(l=>`<th>${l}</th>`).join('')}<th>操作</th></tr></thead><tbody>`;
            data.forEach(item => {
                html += `<tr><td>${item.id}</td>`;
                cfg.fields.forEach(f => {
                    const v = item[f] || '';
                    html +=
                        `<td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(String(v))}">${esc(String(v).substring(0,40))}</td>`;
                });
                html +=
                    `<td><button class="btn btn-sm" onclick="editItem('${adminTab}',${item.id})">✏️</button> <button class="btn btn-sm btn-danger" onclick="deleteItem('${adminTab}',${item.id})">🗑</button></td></tr>`;
            });
            html += `</tbody></table>`;
            html +=
                `<button class="btn btn-gold" style="margin-top:18px;" onclick="addItem('${adminTab}')">＋ 新增</button>`;
            html +=
            `<div id="editFormArea" style="margin-top:20px;padding:20px;background:rgba(0,0,0,0.2);border-radius:12px;display:none;"></div>`;
            area.innerHTML = html;
        }

        function getNextId(tab) { const d = getLocalData(tab) || []; return d.length ? Math.max(...d.map(i => i.id)) +
                1 : 1; }

        function addItem(tab) {
            const cfg = {
                works: ['title', 'author', 'desc', 'image'],
                members: ['name', 'role', 'number', 'signature'],
                news: ['title', 'date', 'content']
            } [tab];
            const labels = {
                works: ['标题', '作者', '描述', '图片URL'],
                members: ['昵称', '职位', '编号', '签名'],
                news: ['标题', '日期', '内容']
            } [tab];
            let h = '<h4 style="color:#fff;letter-spacing:2px;">新增</h4>';
            cfg.forEach((f, i) => {
                const ta = (tab === 'works' && f === 'desc') || (tab === 'news' && f === 'content') || (tab ===
                    'members' && f === 'signature');
                h += `<label>${labels[i]}</label>`;
                h += ta ? `<textarea id="f_${f}" rows="3"></textarea>` :
                    `<input id="f_${f}" value="${tab==='news'&&f==='date'?new Date().toISOString().split('T')[0]:''}">`;
            });
            h +=
                `<button class="btn btn-gold" style="margin-top:12px;" onclick="saveNew('${tab}')">💾 保存</button> <button class="btn" onclick="document.getElementById('editFormArea').style.display='none'">取消</button>`;
            document.getElementById('editFormArea').style.display = 'block';
            document.getElementById('editFormArea').innerHTML = h;
        }

        function editItem(tab, id) {
            const data = getLocalData(tab) || [];
            const item = data.find(d => d.id === id);
            if (!item) return;
            const cfg = {
                works: ['title', 'author', 'desc', 'image'],
                members: ['name', 'role', 'number', 'signature'],
                news: ['title', 'date', 'content']
            } [tab];
            const labels = {
                works: ['标题', '作者', '描述', '图片URL'],
                members: ['昵称', '职位', '编号', '签名'],
                news: ['标题', '日期', '内容']
            } [tab];
            let h = `<h4 style="color:#fff;letter-spacing:2px;">编辑 (ID: ${id})</h4>`;
            cfg.forEach((f, i) => {
                const ta = (tab === 'works' && f === 'desc') || (tab === 'news' && f === 'content') || (tab ===
                    'members' && f === 'signature');
                h += `<label>${labels[i]}</label>`;
                h += ta ? `<textarea id="f_${f}" rows="3">${esc(String(item[f]||''))}</textarea>` :
                    `<input id="f_${f}" value="${esc(String(item[f]||''))}">`;
            });
            h +=
                `<button class="btn btn-gold" style="margin-top:12px;" onclick="saveEdit('${tab}',${id})">💾 更新</button> <button class="btn" onclick="document.getElementById('editFormArea').style.display='none'">取消</button>`;
            document.getElementById('editFormArea').style.display = 'block';
            document.getElementById('editFormArea').innerHTML = h;
        }

        function saveNew(tab) {
            const fields = { works: ['title', 'author', 'desc', 'image'], members: ['name', 'role', 'number',
                    'signature'
                ], news: ['title', 'date', 'content'] } [tab];
            const obj = { id: getNextId(tab) };
            fields.forEach(f => { const el = document.getElementById('f_' + f);
                obj[f] = el ? el.value : ''; });
            if (!obj[fields[0]]) { showToast('⚠️ 请填写必要字段'); return; }
            const data = getLocalData(tab) || [];
            data.push(obj);
            setLocalData(tab, data);
            document.getElementById('editFormArea').style.display = 'none';
            renderAdminContent();
            refreshPage(tab);
            showToast('✅ 已保存（本地）。点"导出 data.json"同步到云端');
        }

        function saveEdit(tab, id) {
            const fields = { works: ['title', 'author', 'desc', 'image'], members: ['name', 'role', 'number',
                    'signature'
                ], news: ['title', 'date', 'content'] } [tab];
            const data = getLocalData(tab) || [];
            const idx = data.findIndex(d => d.id === id);
            if (idx < 0) return;
            fields.forEach(f => { const el = document.getElementById('f_' + f); if (el) data[idx][f] = el
                .value; });
            setLocalData(tab, data);
            document.getElementById('editFormArea').style.display = 'none';
            renderAdminContent();
            refreshPage(tab);
            showToast('✅ 已更新（本地）。点"导出 data.json"同步到云端');
        }

        function deleteItem(tab, id) {
            if (!confirm('确定删除？')) return;
            let data = getLocalData(tab) || [];
            data = data.filter(d => d.id !== id);
            setLocalData(tab, data);
            renderAdminContent();
            refreshPage(tab);
            showToast('🗑 已删除（本地）。点"导出 data.json"同步到云端');
        }

        function refreshPage(tab) { if (tab === 'works') renderWorks(); if (tab === 'members') renderMembers(); if (
                tab === 'news') renderNews(); }

        // ==================== 初始化 ====================
        async function init() {
            initLocalData();
            const synced = await loadCloudData();
            if (synced) {
                // 重新渲染所有页面
            }
            renderWorks();
            renderMembers();
            renderNews();
            document.getElementById('page-home').classList.add('active');
        }
        init();

        console.log('🌌 万象社 · JSON 同步版已就绪');
        console.log('💡 使用提示：在后台修改数据 → 点"导出 data.json" → 上传到 GitHub 仓库 → 所有人自动同步');
    </script>
</body>
</html>
