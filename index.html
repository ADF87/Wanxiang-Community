<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>万象社 · 星月魔法书 | 万般景象，皆汇于此</title>
    <style>
        :root {
            --bg-deep: #03001c;
            --bg-card: rgba(20, 10, 45, 0.72);
            --bg-card-hover: rgba(45, 30, 80, 0.88);
            --moon-glow: #ffe6b3;
            --star-gold: #ffd966;
            --magic-purple: #c084fc;
            --magic-blue: #818cf8;
            --text: #f3e8ff;
            --text-light: #cdc9ff;
            --border: rgba(192, 132, 252, 0.35);
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
            --shadow-magic: 0 0 35px rgba(192, 132, 252, 0.45);
            --radius: 28px;
            --radius-sm: 16px;
            --transition: 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            --font-display: 'Cinema', 'Georgia', 'Noto Serif SC', 'STSong', serif;
            --font-body: 'Inter', 'PingFang SC', 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--font-body);
            background: #020012;
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
            line-height: 1.5;
        }

        /* 魔法星夜底层 + 特效画布 */
        #magicBgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(circle at 30% 20%, #0d0225, #010008);
        }
        #starsCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        #moonCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        #magicDustCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.7;
        }

        /* 星云光晕 (紫罗兰+淡金) */
        .nebula-glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(140px);
            opacity: 0.28;
            pointer-events: none;
            z-index: 0;
            animation: magicFloat 24s infinite alternate ease-in-out;
        }
        .nebula-glow.n1 { width: 650px; height: 650px; background: radial-gradient(circle, #a855f7, #3b0764); top: -15%; left: -10%; }
        .nebula-glow.n2 { width: 550px; height: 550px; background: radial-gradient(circle, #fbbf24, #7e2e84); bottom: -10%; right: -5%; animation-delay: -7s; opacity: 0.3; }
        .nebula-glow.n3 { width: 480px; height: 480px; background: radial-gradient(circle, #60a5fa, #1e1b4b); top: 40%; left: 70%; animation-delay: -13s; opacity: 0.25; }
        .nebula-glow.n4 { width: 700px; height: 700px; background: radial-gradient(circle, #d946ef, #2e1065); bottom: -20%; left: -15%; opacity: 0.2; filter: blur(180px); }

        @keyframes magicFloat {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(35px, -25px) scale(1.1); }
        }

        .app-container { position: relative; z-index: 10; max-width: 1300px; margin: 0 auto; padding: 0 24px; }

        /* 磨砂玻璃 + 魔法边框 */
        .navbar {
            position: sticky;
            top: 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 28px;
            margin-top: 16px;
            background: rgba(15, 5, 35, 0.6);
            backdrop-filter: blur(18px) saturate(180%);
            border: 1px solid rgba(192, 132, 252, 0.5);
            border-radius: 80px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), inset 0 0 10px rgba(255, 215, 0, 0.1);
            transition: all var(--transition);
        }
        .navbar:hover { border-color: rgba(255, 200, 100, 0.7); box-shadow: 0 0 20px rgba(192, 132, 252, 0.4); }

        .logo { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo-text {
            font-family: var(--font-display);
            font-size: 1.7rem;
            font-weight: 600;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #f9e1a0, #d9a7ff, #a45ee5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(200, 120, 255, 0.6);
        }

        .nav-links { display: flex; list-style: none; gap: 10px; flex-wrap: wrap; }
        .nav-links li a {
            color: #e0c9ff;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 500;
            letter-spacing: 1px;
            transition: all 0.3s;
            cursor: pointer;
        }
        .nav-links li a:hover, .nav-links li a.active {
            background: rgba(192, 132, 252, 0.3);
            color: #ffffff;
            box-shadow: 0 0 15px rgba(192, 132, 252, 0.5);
            border: 1px solid rgba(255, 210, 120, 0.6);
        }

        .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
        .hamburger span { width: 26px; height: 2.5px; background: #f0cdff; border-radius: 3px; }

        .page-section { display: none; animation: spellRise 0.7s ease-out forwards; padding: 40px 0 70px; }
        .page-section.active { display: block; }
        @keyframes spellRise { from { opacity: 0; transform: translateY(35px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }

        .section-header { text-align: center; margin-bottom: 60px; }
        .section-header h1 {
            font-family: var(--font-display);
            font-size: 3.2rem;
            letter-spacing: 6px;
            background: linear-gradient(180deg, #fff2cf, #e6b3ff, #b77eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(255, 200, 150, 0.4);
        }
        .subtitle { color: #f0ccff; letter-spacing: 4px; font-size: 0.95rem; text-shadow: 0 0 5px #a87eff; }
        .divider { width: 90px; height: 2px; background: linear-gradient(90deg, transparent, #f0b3ff, #c37aff, #f0b3ff, transparent); margin: 18px auto; }

        .work-card, .member-name-card, .news-card, .admin-panel {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(201, 148, 255, 0.4);
            border-radius: var(--radius);
            transition: all var(--transition);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }
        .work-card:hover, .member-name-card:hover, .news-card:hover {
            transform: translateY(-8px) scale(1.01);
            border-color: rgba(255, 204, 112, 0.8);
            box-shadow: var(--shadow-magic), 0 20px 40px rgba(0, 0, 0, 0.6);
            background: var(--bg-card-hover);
        }
        .card-img { width: 100%; height: 230px; object-fit: cover; transition: transform 0.6s ease; cursor: pointer; }
        .work-card:hover .card-img { transform: scale(1.04); }
        .card-body { padding: 20px; }
        .card-body h3 { font-size: 1.3rem; font-weight: 600; letter-spacing: 1px; color: #ffeeca; }
        .author { color: #d9b2ff; font-size: 0.85rem; margin: 6px 0 8px; }

        .members-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 28px; }
        .member-name-card { padding: 24px 12px; text-align: center; cursor: pointer; border-radius: 40px; }
        .avatar-dot {
            width: 85px; height: 85px; margin: 0 auto 15px;
            background: radial-gradient(circle, #b77eff, #5b21b6);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem; font-weight: bold;
            box-shadow: 0 0 25px rgba(192, 132, 252, 0.6);
            transition: all 0.3s;
            overflow: hidden;
            color: #fde047;
        }
        .member-name-card:hover .avatar-dot { transform: scale(1.08) rotate(3deg); box-shadow: 0 0 35px rgba(255, 215, 100, 0.9); }

        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .news-img { width: 100%; height: 180px; object-fit: cover; border-bottom: 1px solid rgba(192, 132, 252, 0.3); }
        .news-body { padding: 20px; }
        .news-date { color: #fbcfe8; font-size: 0.75rem; letter-spacing: 2px; margin-bottom: 8px; }

        /* 魔法模态框 */
        .modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(2, 0, 12, 0.85); backdrop-filter: blur(16px);
            z-index: 200; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .modal-overlay.show { opacity: 1; pointer-events: all; }
        .modal-panel {
            background: rgba(20, 8, 45, 0.96);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(209, 149, 255, 0.7);
            border-radius: 48px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8), 0 0 20px rgba(255, 200, 100, 0.3);
            transform: scale(0.96);
            transition: transform 0.25s cubic-bezier(0.2, 1.2, 0.4, 1);
        }
        .modal-overlay.show .modal-panel { transform: scale(1); }
        .article-modal-panel, .work-modal-panel { max-width: 800px; max-height: 85vh; overflow-y: auto; border-radius: 40px; }
        .work-modal-img { width: 100%; max-height: 400px; object-fit: contain; border-radius: 32px; margin-bottom: 24px; background: #0b0520; border: 1px solid #d9a7ff; }
        .work-modal-title { font-size: 1.8rem; letter-spacing: 3px; margin-bottom: 8px; background: linear-gradient(135deg, #ffe6c7, #eac8ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .work-modal-author { color: #f0bcff; font-size: 1rem; margin-bottom: 20px; border-left: 3px solid #fbbf24; padding-left: 12px; }
        .work-modal-desc { color: #d9d2ff; line-height: 1.7; font-size: 1rem; }

        .btn {
            display: inline-block; padding: 10px 26px; border-radius: 40px;
            background: rgba(192, 132, 252, 0.2); backdrop-filter: blur(6px);
            border: 1px solid rgba(209, 149, 255, 0.6);
            color: #ffefcf; cursor: pointer; transition: all 0.25s;
            font-weight: 500;
        }
        .btn-gold { background: rgba(251, 191, 36, 0.2); border-color: #fbbf24; color: #ffefb9; }
        .btn-gold:hover { background: rgba(251, 191, 36, 0.4); box-shadow: 0 0 18px #fbbf24; transform: translateY(-2px); }
        .admin-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .admin-table th, .admin-table td { padding: 12px 8px; border-bottom: 1px solid rgba(192, 132, 252, 0.3); }
        input, textarea { background: rgba(10, 3, 25, 0.9); border: 1px solid rgba(209, 149, 255, 0.6); border-radius: 28px; padding: 12px 18px; color: #f3e8ff; width: 100%; margin: 5px 0 14px; backdrop-filter: blur(4px); }
        input:focus, textarea:focus { border-color: #fbbf24; outline: none; box-shadow: 0 0 15px rgba(251, 191, 36, 0.5); }

        footer { text-align: center; padding: 40px 0 30px; opacity: 0.7; font-size: 0.8rem; letter-spacing: 2px; color: #c9b2ff; }

        @media (max-width: 768px) {
            .nav-links { display: none; flex-direction: column; background: rgba(15, 5, 35, 0.95); backdrop-filter: blur(24px); position: absolute; top: 70px; left: 20px; right: 20px; border-radius: 32px; padding: 20px; gap: 12px; }
            .nav-links.open { display: flex; }
            .hamburger { display: flex; }
            .section-header h1 { font-size: 2.2rem; }
            .works-grid, .news-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- 魔法星夜底层: 静态深紫渐变 + 月亮 + 魔法尘埃 -->

    <script>
        // ---------- 魔法星夜特效 (轻量 + 星月元素) ----------
        (function magicVisuals() {
            let w, h;
            const bgCanvas = document.getElementById('magicBgCanvas');
            const bgCtx = bgCanvas.getContext('2d');
            function resizeAll() {
                w = window.innerWidth;
                h = window.innerHeight;
                bgCanvas.width = w; bgCanvas.height = h;
                starsCanvas.width = w; starsCanvas.height = h;
                moonCanvas.width = w; moonCanvas.height = h;
                dustCanvas.width = w; dustCanvas.height = h;
                drawStaticBg();
            }
            function drawStaticBg() {
                const grad = bgCtx.createLinearGradient(0, 0, 0, h);
                grad.addColorStop(0, '#0d022a');
                grad.addColorStop(0.5, '#160439');
                grad.addColorStop(1, '#030012');
                bgCtx.fillStyle = grad;
                bgCtx.fillRect(0, 0, w, h);
            }
            window.addEventListener('resize', resizeAll);
            resizeAll();

            // 月亮绘制
            const moonCanvas = document.getElementById('moonCanvas');
            const moonCtx = moonCanvas.getContext('2d');
            let moonX, moonY, timeMoon = 0;
            function drawMoon() {
                if(!moonCtx) return;
                moonCtx.clearRect(0, 0, w, h);
                moonX = w * 0.85; moonY = h * 0.12;
                const glowGrd = moonCtx.createRadialGradient(moonX, moonY, 10, moonX, moonY, 110);
                glowGrd.addColorStop(0, `rgba(255, 230, 170, ${0.35 + Math.sin(timeMoon)*0.05})`);
                glowGrd.addColorStop(0.7, `rgba(180, 120, 255, 0.2)`);
                glowGrd.addColorStop(1, 'transparent');
                moonCtx.fillStyle = glowGrd;
                moonCtx.beginPath();
                moonCtx.arc(moonX, moonY, 120, 0, Math.PI*2);
                moonCtx.fill();
                moonCtx.shadowBlur = 30;
                moonCtx.shadowColor = '#ffe6a3';
                moonCtx.beginPath();
                moonCtx.arc(moonX, moonY, 35, 0, Math.PI*2);
                moonCtx.fillStyle = '#fdf4dc';
                moonCtx.fill();
                moonCtx.beginPath();
                moonCtx.arc(moonX-8, moonY-5, 6, 0, Math.PI*2);
                moonCtx.fillStyle = '#e6d5b3';
                moonCtx.fill();
                moonCtx.beginPath();
                moonCtx.arc(moonX+6, moonY+3, 4, 0, Math.PI*2);
                moonCtx.fill();
                for(let i=0;i<12;i++) {
                    let rad = (timeMoon*0.02 + i) * Math.PI*2 / 12;
                    let x = moonX + Math.cos(rad)*68;
                    let y = moonY + Math.sin(rad)*48;
                    moonCtx.fillStyle = `rgba(255, 210, 90, ${0.5+Math.sin(timeMoon*3+i)*0.2})`;
                    moonCtx.beginPath();
                    moonCtx.arc(x, y, 2.5, 0, Math.PI*2);
                    moonCtx.fill();
                }
                moonCtx.shadowBlur = 0;
                timeMoon += 0.016;
                requestAnimationFrame(drawMoon);
            }
            drawMoon();

            // 星辰
            const starsCanvas = document.getElementById('starsCanvas');
            const starsCtx = starsCanvas.getContext('2d');
            let starsArray = [], shootingStars = [];
            function initStars() {
                starsArray = [];
                for(let i=0;i<420;i++) {
                    starsArray.push({
                        x: Math.random() * w, y: Math.random() * h,
                        size: Math.random() * 2.2 + 0.8,
                        alpha: Math.random() * 0.6 + 0.3,
                        twinkle: Math.random() * 0.03 + 0.008,
                        hue: 260 + Math.random() * 80
                    });
                }
            }
            function animateStars() {
                if(!starsCtx) return;
                starsCtx.clearRect(0, 0, w, h);
                let t = Date.now() * 0.004;
                starsArray.forEach(s => {
                    let tw = Math.sin(t * s.twinkle * 60) * 0.4 + 0.6;
                    let a = s.alpha * tw;
                    starsCtx.fillStyle = `hsla(${s.hue}, 85%, 70%, ${a})`;
                    starsCtx.beginPath();
                    starsCtx.arc(s.x, s.y, s.size * 0.7, 0, Math.PI*2);
                    starsCtx.fill();
                    starsCtx.fillStyle = `hsla(${s.hue}, 90%, 80%, ${a*0.6})`;
                    starsCtx.beginPath();
                    starsCtx.arc(s.x, s.y, s.size*1.8, 0, Math.PI*2);
                    starsCtx.fill();
                });
                if(Math.random()<0.025 && shootingStars.length<2) {
                    shootingStars.push({
                        x: Math.random() * w * 0.8, y: Math.random() * h * 0.3,
                        len: 80, speed: Math.random() * 12 + 7,
                        angle: Math.PI/4 + (Math.random()-0.5)*0.3,
                        life: 70, alpha: 1
                    });
                }
                shootingStars = shootingStars.filter(ss => {
                    ss.x += Math.cos(ss.angle) * ss.speed;
                    ss.y += Math.sin(ss.angle) * ss.speed;
                    ss.life--; ss.alpha = ss.life/70;
                    if(ss.life<=0) return false;
                    let ex = ss.x - Math.cos(ss.angle)*ss.len;
                    let ey = ss.y - Math.sin(ss.angle)*ss.len;
                    let grad = starsCtx.createLinearGradient(ss.x, ss.y, ex, ey);
                    grad.addColorStop(0, `rgba(255, 210, 100, ${ss.alpha*0.9})`);
                    grad.addColorStop(1, `rgba(200, 100, 250, 0)`);
                    starsCtx.strokeStyle = grad;
                    starsCtx.lineWidth = 2.2;
                    starsCtx.beginPath();
                    starsCtx.moveTo(ss.x, ss.y);
                    starsCtx.lineTo(ex, ey);
                    starsCtx.stroke();
                    starsCtx.fillStyle = `rgba(255, 220, 130, ${ss.alpha})`;
                    starsCtx.beginPath();
                    starsCtx.arc(ss.x, ss.y, 3, 0, Math.PI*2);
                    starsCtx.fill();
                    return true;
                });
                requestAnimationFrame(animateStars);
            }
            initStars();
            animateStars();

            // 魔法粉尘
            const dustCanvas = document.getElementById('magicDustCanvas');
            const dustCtx = dustCanvas.getContext('2d');
            let dustParticles = [];
            for(let i=0;i<200;i++) {
                dustParticles.push({
                    x: Math.random() * w, y: Math.random() * h,
                    size: Math.random() * 3 + 1.2,
                    vx: (Math.random() - 0.5) * 0.2,
                    vy: (Math.random() - 0.5) * 0.12,
                    alpha: Math.random() * 0.5 + 0.2,
                    colorHue: 280 + Math.random() * 80
                });
            }
            function animateDust() {
                if(!dustCtx) return;
                dustCtx.clearRect(0, 0, w, h);
                for(let d of dustParticles) {
                    d.x += d.vx;
                    d.y += d.vy;
                    if(d.x < -30) d.x = w+30;
                    if(d.x > w+30) d.x = -30;
                    if(d.y < -30) d.y = h+30;
                    if(d.y > h+30) d.y = -30;
                    dustCtx.fillStyle = `hsla(${d.colorHue}, 90%, 70%, ${d.alpha*0.45})`;
                    dustCtx.beginPath();
                    dustCtx.arc(d.x, d.y, d.size*0.8, 0, Math.PI*2);
                    dustCtx.fill();
                    dustCtx.fillStyle = `hsla(${d.colorHue+20}, 90%, 75%, ${d.alpha*0.25})`;
                    dustCtx.beginPath();
                    dustCtx.arc(d.x, d.y, d.size*1.5, 0, Math.PI*2);
                    dustCtx.fill();
                }
                requestAnimationFrame(animateDust);
            }
            animateDust();
        })();

        // ========== 数据管理核心 (密码 a1472880) ==========
        const DATA_KEYS = { works: 'wxs_works', members: 'wxs_members', news: 'wxs_news' };
        const defaultWorks = [
            { id:1, title:'月之咒语', author:'林月如', desc:'魔法光影绘画，月光与星尘交织而成，蕴含着古老的祝福。', image:'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80' },
            { id:2, title:'星尘魔杖', author:'陈远航', desc:'星轨摄影与炼金术符号的艺术结合，捕捉宇宙魔力。', image:'https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=800&q=80' },
            { id:3, title:'占星秘仪', author:'苏星野', desc:'数字插画，描绘占星轮盘与魔法灵境。', image:'https://images.unsplash.com/photo-1534447677768-be436bb09401?w=800&q=80' }
        ];
        const defaultMembers = [{ id:1, name:'林月如', role:'月之社长', number:'WX-月痕', signature:'以月光为墨，书万象之诗。', avatar:''},{ id:2, name:'陈远航', role:'观星使者', number:'WX-星语', signature:'星轨中寻觅魔法的轨迹。', avatar:''}];
        const defaultNews = [{ id:1, date:'2025-03-08', title:'星月魔法展即将开启', summary:'沉浸式魔法光影展，邂逅星月奇境。', content:'<p>沉浸式展览结合光影与魔法咒文，带来神秘体验。</p><img src="https://images.unsplash.com/photo-1460661419201-fd4cecdf8a8b?w=600&q=80">', image:'https://images.unsplash.com/photo-1460661419201-fd4cecdf8a8b?w=400&q=80'}];
        
        function getLocalData(key){ try{ return JSON.parse(localStorage.getItem(DATA_KEYS[key])); } catch(e){return null;} }
        function setLocalData(key,data){ localStorage.setItem(DATA_KEYS[key], JSON.stringify(data)); }
        function initLocalData(){ if(!getLocalData('works')) setLocalData('works',defaultWorks); if(!getLocalData('members')) setLocalData('members',defaultMembers); if(!getLocalData('news')) setLocalData('news',defaultNews); }
        async function loadCloudData(){ try{ let res=await fetch('data.json'); if(res.ok){ let json=await res.json(); if(json.works)setLocalData('works',json.works); if(json.members)setLocalData('members',json.members); if(json.news)setLocalData('news',json.news); return true;}}catch(e){} return false;}
        function exportDataJSON(){ let data={works:getLocalData('works'),members:getLocalData('members'),news:getLocalData('news')}; let a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'})); a.download='data.json'; a.click(); showToast('✨ 魔法书卷 data.json 已导出 ✨');}
        function showToast(msg){ let t=document.getElementById('toast'); t.textContent=msg; t.style.opacity='1'; setTimeout(()=>t.style.opacity='0',2500);}
        
        let currentPage='home';
        function navigateTo(page){ 
            if(currentPage===page && page!=='admin') return;
            document.querySelectorAll('.page-section').forEach(s=>s.classList.remove('active'));
            document.getElementById('page-'+page).classList.add('active');
            currentPage=page;
            document.querySelectorAll('.nav-links a').forEach(a=>a.classList.remove('active'));
            let activeLink=document.querySelector(`.nav-links a[data-page="${page}"]`); if(activeLink) activeLink.classList.add('active');
            if(page==='works') renderWorks(); if(page==='members') renderMembers(); if(page==='news') renderNews(); if(page==='admin') checkAdminStatus();
            window.scrollTo({top:0,behavior:'smooth'}); document.getElementById('navLinks')?.classList.remove('open');
        }
        
        function renderWorks(){ 
            let works=getLocalData('works')||[]; 
            document.getElementById('worksGrid').innerHTML=works.map(w=>`
                <div class="work-card" data-id="${w.id}">
                    <img class="card-img" src="${escapeHtml(w.image)}" onerror="this.src='https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&q=60'">
                    <div class="card-body">
                        <h3>${escapeHtml(w.title)}</h3>
                        <p class="author">🔮 ${escapeHtml(w.author)}</p>
                        <p class="desc">${escapeHtml(w.desc.substring(0,80))}${w.desc.length>80?'…':''}</p>
                    </div>
                </div>`).join('');
            document.querySelectorAll('.work-card').forEach(card => {
                card.addEventListener('click', (e) => { const id = parseInt(card.getAttribute('data-id')); openWorkDetail(id); });
            });
        }
        function openWorkDetail(id){ let works=getLocalData('works')||[]; let w=works.find(w=>w.id===id); if(w){ document.getElementById('workModalImg').src=w.image; document.getElementById('workModalTitle').innerText=w.title; document.getElementById('workModalAuthor').innerHTML=`🔮 ${escapeHtml(w.author)}`; document.getElementById('workModalDesc').innerHTML=w.desc; document.getElementById('workModal').classList.add('show'); document.body.style.overflow='hidden'; } }
        function closeWorkModal(){ document.getElementById('workModal').classList.remove('show'); document.body.style.overflow=''; }
        function renderMembers(){ let m=getLocalData('members')||[]; document.getElementById('membersGrid').innerHTML=m.map(mem=>{let ini=escapeHtml((mem.name||'?').charAt(0)); let avHtml=mem.avatar?`<img src="${escapeHtml(mem.avatar)}" style="width:100%;height:100%;object-fit:cover;">`:ini; return `<div class="member-name-card" onclick="openMemberModal('${mem.id}')"><div class="avatar-dot">${avHtml}</div><div class="member-name">${escapeHtml(mem.name)}</div><div class="member-role-hint">✨ ${escapeHtml(mem.role)}</div></div>`;}).join('');}
        function openMemberModal(id){ let m=getLocalData('members').find(x=>String(x.id)===String(id)); if(!m)return; let avatarDiv=document.getElementById('modalAvatar'); if(m.avatar)avatarDiv.innerHTML=`<img src="${escapeHtml(m.avatar)}" style="width:100%;height:100%;object-fit:cover;">`; else avatarDiv.innerHTML=(m.name||'?').charAt(0); document.getElementById('modalName').innerText=m.name; document.getElementById('modalRole').innerText='✦ '+m.role; document.getElementById('modalId').innerText='星月编号：'+m.number; document.getElementById('modalSignature').innerText='「'+ (m.signature||'')+'」'; document.getElementById('memberModal').classList.add('show');}
        function closeMemberModal(){ document.getElementById('memberModal').classList.remove('show');}
        function renderNews(){ let news=getLocalData('news')||[]; document.getElementById('newsList').innerHTML=news.map(n=>`<div class="news-card" onclick="openArticle(${n.id})">${n.image?`<img class="news-img" src="${escapeHtml(n.image)}" onerror="this.style.display='none'">`:''}<div class="news-body"><div class="news-date">🌙 ${escapeHtml(n.date)}</div><h3>${escapeHtml(n.title)}</h3><p class="news-summary">${escapeHtml((n.summary||'').substring(0,80))}</p></div></div>`).join('');}
        function openArticle(id){ let art=getLocalData('news').find(n=>n.id===id); if(art){ document.getElementById('articleDate').innerHTML='🌙 '+escapeHtml(art.date); document.getElementById('articleTitle').innerHTML=escapeHtml(art.title); document.getElementById('articleBody').innerHTML=art.content||'暂无内容'; document.getElementById('articleModal').classList.add('show');}}
        function closeArticleModal(){ document.getElementById('articleModal').classList.remove('show');}
        function escapeHtml(str){ let div=document.createElement('div'); div.textContent=str||''; return div.innerHTML;}
        
        // 后台管理 (新密码 a1472880)
        const ADMIN_PW = 'a1472880';
        function checkAdminStatus(){ let logged=sessionStorage.getItem('wxs_admin'); document.getElementById('adminLoginArea').style.display=logged==='true'?'none':'block'; document.getElementById('adminPanelArea').style.display=logged==='true'?'block':'none'; if(logged==='true') switchAdminTab('works');}
        function adminLogin(){ if(document.getElementById('adminPassword').value===ADMIN_PW){ sessionStorage.setItem('wxs_admin','true'); checkAdminStatus(); showToast('✅ 登录成功'); } else showToast('❌ 密码错误');}
        function adminLogout(){ sessionStorage.removeItem('wxs_admin'); checkAdminStatus(); showToast('已退出');}
        let adminTab='works';
        function switchAdminTab(tab){ adminTab=tab; renderAdminContent();}
        function renderAdminContent(){ let data=getLocalData(adminTab)||[]; let cfg={works:{fields:['title','author','desc','image'],labels:['标题','作者','描述','图片URL']}, members:{fields:['name','role','number','signature','avatar'],labels:['昵称','职位','编号','签名','头像URL']}, news:{fields:['title','date','summary','content','image'],labels:['标题','日期','摘要','正文','封面URL']}}[adminTab]; let html=`<h3>${adminTab}管理</h3><table class="admin-table"><tr>${cfg.labels.map(l=>`<th>${l}</th>`).join('')}<th>操作</th></tr>`; data.forEach(item=>{ html+=`<tr>${cfg.fields.map(f=>`<td style="max-width:150px;overflow:hidden;">${escapeHtml(String(item[f]||'').substring(0,25))}</td>`).join('')}<td><button class="btn btn-sm" onclick="editItem('${adminTab}',${item.id})">✏️</button> <button class="btn btn-sm" onclick="deleteItem('${adminTab}',${item.id})">🗑</button></td></tr>`; }); html+=`</table><button class="btn btn-gold" onclick="addItem('${adminTab}')">＋ 新增</button><div id="editFormArea" style="margin-top:20px;"></div>`; document.getElementById('adminContentArea').innerHTML=html;}
        function getNextId(tab){ let d=getLocalData(tab)||[]; return d.length?Math.max(...d.map(i=>i.id))+1:1;}
        function addItem(tab){ let cfgMap={works:['title','author','desc','image'],members:['name','role','number','signature','avatar'],news:['title','date','summary','content','image']}; let fields=cfgMap[tab]; let html='<h4>新增条目</h4>'; fields.forEach(f=>{ html+=`<label>${f}</label><textarea id="f_${f}" rows="2"></textarea>`; if(f==='content') html+=`<button type="button" class="btn btn-sm" onclick="insertImageToField('f_content')">📷 插入图片</button>`; }); html+=`<button class="btn btn-gold" onclick="saveNew('${tab}')">保存</button> <button class="btn" onclick="document.getElementById('editFormArea').innerHTML=''">取消</button>`; document.getElementById('editFormArea').innerHTML=html;}
        function editItem(tab,id){ let data=getLocalData(tab); let item=data.find(d=>d.id===id); let cfgMap={works:['title','author','desc','image'],members:['name','role','number','signature','avatar'],news:['title','date','summary','content','image']}; let fields=cfgMap[tab]; let html=`<h4>编辑 ID ${id}</h4>`; fields.forEach(f=>{ let val=item[f]||''; html+=`<label>${f}</label><textarea id="f_${f}" rows="2">${escapeHtml(val)}</textarea>`; if(f==='content') html+=`<button type="button" class="btn btn-sm" onclick="insertImageToField('f_content')">📷 插入图片</button>`; }); html+=`<button class="btn btn-gold" onclick="saveEdit('${tab}',${id})">更新</button> <button class="btn" onclick="document.getElementById('editFormArea').innerHTML=''">取消</button>`; document.getElementById('editFormArea').innerHTML=html;}
        function insertImageToField(fieldId){ let url=prompt('输入图片URL:'); if(url){ let textarea=document.getElementById(fieldId); let tag=`<img src="${url}" alt="魔法图像" style="max-width:100%">`; let start=textarea.selectionStart; let val=textarea.value; textarea.value=val.slice(0,start)+tag+val.slice(start);}}
        function saveNew(tab){ let cfgMap={works:['title','author','desc','image'],members:['name','role','number','signature','avatar'],news:['title','date','summary','content','image']}; let fields=cfgMap[tab]; let obj={id:getNextId(tab)}; fields.forEach(f=>{ let el=document.getElementById('f_'+f); if(el) obj[f]=el.value;}); let data=getLocalData(tab)||[]; data.push(obj); setLocalData(tab,data); document.getElementById('editFormArea').innerHTML=''; renderAdminContent(); refreshPage(tab); showToast('已保存至本地');}
        function saveEdit(tab,id){ let cfgMap={works:['title','author','desc','image'],members:['name','role','number','signature','avatar'],news:['title','date','summary','content','image']}; let fields=cfgMap[tab]; let data=getLocalData(tab); let idx=data.findIndex(d=>d.id===id); fields.forEach(f=>{ let el=document.getElementById('f_'+f); if(el) data[idx][f]=el.value;}); setLocalData(tab,data); document.getElementById('editFormArea').innerHTML=''; renderAdminContent(); refreshPage(tab); showToast('已更新');}
        function deleteItem(tab,id){ if(!confirm('确认删除？')) return; let data=getLocalData(tab).filter(d=>d.id!==id); setLocalData(tab,data); renderAdminContent(); refreshPage(tab); showToast('已删除');}
        function refreshPage(tab){ if(tab==='works') renderWorks(); if(tab==='members') renderMembers(); if(tab==='news') renderNews();}
        
        window.onload=()=>{ initLocalData(); loadCloudData().then(()=>{ renderWorks(); renderMembers(); renderNews(); }); checkAdminStatus(); };
        window.toggleMenu=function(){document.getElementById('navLinks').classList.toggle('open');};
        window.closeMemberModal=closeMemberModal; window.closeArticleModal=closeArticleModal; window.openArticle=openArticle; window.openMemberModal=openMemberModal;
        window.closeWorkModal=closeWorkModal;
        document.getElementById('workModal').addEventListener('click',(e)=> { if(e.target===document.getElementById('workModal')) closeWorkModal(); });
        document.addEventListener('keydown',(e)=>{ if(e.key==='Escape'){ closeWorkModal(); closeMemberModal(); closeArticleModal(); } });
        window.insertImageToField=insertImageToField; window.addItem=addItem; window.editItem=editItem; window.deleteItem=deleteItem;
        window.saveNew=saveNew; window.saveEdit=saveEdit;
        window.adminLogin=adminLogin; window.adminLogout=adminLogout; window.switchAdminTab=switchAdminTab; window.exportDataJSON=exportDataJSON;
    </script>
